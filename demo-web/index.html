<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>毕业离校申请系统 - UI Demo</title>
  <link rel="stylesheet" href="css/global.css?v=20260613">
  <script src="js/api.js?v=20260613"></script>
<script>
    let currentFilter = 'all';
    let approvalOffset = 0;
    let approvalHasMore = true;
    let deanDisplayedApps = new Set(); // Track displayed application IDs for dean deduplication
    let adminFilters = {}; // 管理员筛选器状态
    // currentUser is declared in api.js

    // HTML escape helper to prevent XSS
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadMyApplications() {
        if (!currentToken) return;
        const data = await apiGetApplications();
        const listContainer = document.getElementById('approval-list-container');

        if (data.results && data.results.length > 0) {
            // 检查是否有failed或rejected状态，显示横幅
            const hasFailed = data.results.some(a => a.status === 'failed');
            const hasRejected = data.results.some(a => a.status === 'rejected');

            if (hasFailed) {
                showFailedApplicationBanner();
            } else if (hasRejected) {
                showRejectedApplicationBanner();
            }

            // Apply filter
            let filtered = data.results;
            if (currentFilter === 'pending') {
                filtered = data.results.filter(a => a.status && a.status.startsWith('pending_'));
            } else if (currentFilter === 'approved') {
                filtered = data.results.filter(a => a.status === 'approved');
            } else if (currentFilter === 'rejected') {
                filtered = data.results.filter(a => a.status === 'rejected');
            }

            let htmlStr = '';
            filtered.forEach(app => {
                const statusDisplay = getStatusDisplay(app.status);
                const appIdDisplay = app.application_id ? app.application_id.substring(0,8) : '未知';
                htmlStr += '<div class="card" style="cursor: pointer;" onclick="openApplication(\'' + app.application_id + '\')">' +
                  '<div class="flex-row justify-between align-center" style="margin-bottom: 8px;">' +
                    '<span style="font-size: 16px; font-weight: bold;">申请 ' + appIdDisplay + '</span>' +
                    '<span class="tag ' + statusDisplay.class + '">' + statusDisplay.text + '</span>' +
                  '</div>' +
                  '<div style="margin-bottom: 4px;">' +
                    '<span style="font-size: 14px; color: #999; margin-right: 8px;">离校日期:</span>' +
                    '<span style="font-size: 14px; color: #333;">' + (app.leave_date || '-') + '</span>' +
                  '</div>' +
                  '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;">' +
                    '<span style="font-size: 12px; color: #999;">' + new Date(app.created_at).toLocaleString() + '</span>' +
                  '</div>' +
                '</div>';
            });
            listContainer.innerHTML = htmlStr;
        } else {
            listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">暂无申请记录</div>';
        }
    }

    async function loadApprovals(append = false) {
        console.log('[DEBUG] loadApprovals called, append=', append, 'currentToken=', currentToken);
        if (!currentToken) return;

        if (!append) {
            approvalOffset = 0;
            approvalHasMore = true;
        }

        // Map currentFilter to Application status
        // BUT: if field filters are active, ignore status filter to show all matching records
        let status = null;
        const hasFieldFilter = adminFilters && Object.keys(adminFilters).length > 0;

        if (!hasFieldFilter) {
            // No field filter: apply status filter based on tab
            if (currentFilter === 'pending') {
                status = null; // Will filter after fetch
            } else if (currentFilter === 'approved') {
                status = 'approved';
            } else if (currentFilter === 'rejected') {
                status = 'rejected';
            }
        }
        // If field filter active: status=null, fetch all statuses

        const listContainer = document.getElementById('approval-list-container');
        const loadMoreBtn = document.getElementById('load-more-approvals');

        const BATCH_SIZE = 20;
        const data = await apiGetApplicationsForAdmin(status, BATCH_SIZE, approvalOffset, adminFilters);
        console.log('[DEBUG] apiGetApplicationsForAdmin returned:', data, 'offset:', approvalOffset);

        if (!data || !data.results) {
            return;
        }

        let results = data.results;
        const totalCount = data.count;

        // Remove client-side status filtering - let renderApplications handle it after deduplication

        approvalOffset += BATCH_SIZE;
        approvalHasMore = approvalOffset < totalCount;

        if (!append) {
            listContainer.innerHTML = '';
        }

        renderApplications(results);

        if (approvalHasMore) {
            loadMoreBtn.style.display = 'block';
        } else {
            loadMoreBtn.style.display = 'none';
        }

        if (!append) {
            showAdminFiltersUI();
        }
    }

    function renderApplications(applications) {
        const listContainer = document.getElementById('approval-list-container');

        // Deduplicate by student_id: prioritize final states (rejected > approved > pending)
        const statusPriority = { 'rejected': 3, 'approved': 2, 'pending_counselor': 1, 'pending_dorm_manager': 1 };
        const studentMap = new Map();

        applications.forEach(app => {
            const existing = studentMap.get(app.student_id);
            const currentPriority = statusPriority[app.status] || 0;
            const existingPriority = existing ? (statusPriority[existing.status] || 0) : -1;

            if (!existing || currentPriority > existingPriority ||
                (currentPriority === existingPriority && new Date(app.created_at) > new Date(existing.created_at))) {
                studentMap.set(app.student_id, app);
            }
        });
        let uniqueApps = Array.from(studentMap.values());

        // Apply currentFilter after deduplication
        if (currentFilter === 'pending') {
            uniqueApps = uniqueApps.filter(app =>
                app.status === 'pending_dorm_manager' || app.status === 'pending_counselor'
            );
        } else if (currentFilter === 'approved') {
            uniqueApps = uniqueApps.filter(app => app.status === 'approved');
        } else if (currentFilter === 'rejected') {
            uniqueApps = uniqueApps.filter(app => app.status === 'rejected');
        }
        // currentFilter === 'all': no additional filter

        // Status display map
        const statusMap = {
            'pending_dorm_manager': { text: '待宿管审批', cls: 'tag-pending' },
            'pending_counselor': { text: '待辅导员审批', cls: 'tag-pending' },
            'approved': { text: '已通过', cls: 'tag-approved' },
            'rejected': { text: '已驳回', cls: 'tag-rejected' }
        };

        uniqueApps.forEach(app => {
            console.log('[DEBUG] renderApplications app:', app, 'application_id type:', typeof app.application_id, 'value:', app.application_id);
            const statusInfo = statusMap[app.status] || { text: app.status, cls: 'tag-pending' };
            const appId = app.application_id || app.id || (app.application ? app.application.id : null);
            if (!appId || typeof appId !== 'string') {
                console.error('[ERROR] Invalid application_id:', appId, 'app:', app);
                return;
            }
            const safeAppId = escapeHtml(appId).substring(0,8);
            const safeStudentName = escapeHtml(app.student_name || '-');
            const safeStudentId = escapeHtml(app.student_id || '-');

            // Check if should show checkbox
            const isPending = app.status === 'pending_dorm_manager' || app.status === 'pending_counselor';
            const myApproval = app.approvals?.find(ap =>
                ap.approver_id === currentUser?.user_id && ap.decision === 'pending'
            );
            const showCheckbox = isPending && myApproval && (currentUser?.role === 'dorm_manager' || currentUser?.role === 'counselor');

            const card = document.createElement('div');
            card.className = 'card';
            card.style.cssText = 'cursor: pointer; display: flex; gap: 12px;';

            card.innerHTML = `
                ${showCheckbox ? `<input type="checkbox" class="approval-checkbox" data-approval-id="${myApproval.id}" onclick="event.stopPropagation(); toggleBatchBar();" style="width: 20px; height: 20px; cursor: pointer;">` : ''}
                <div style="flex: 1;" onclick="openApplication('${appId}')">
                    <div class="flex-row justify-between align-center" style="margin-bottom: 8px;">
                        <span style="font-size: 16px; font-weight: bold;">申请 ${safeAppId}</span>
                        <span class="tag ${statusInfo.cls}">${statusInfo.text}</span>
                    </div>
                    <div style="margin-bottom: 4px;">
                        <span style="font-size: 14px; color: #999; margin-right: 8px;">学生:</span>
                        <span style="font-size: 14px; color: #333;">${safeStudentName} (${safeStudentId})</span>
                    </div>
                    <div style="font-size: 12px; color: #999;">
                        创建: ${app.created_at ? new Date(app.created_at).toLocaleString('zh-CN') : '-'}
                    </div>
                </div>
            `;

            listContainer.appendChild(card);
        });

        // 显示/隐藏全选栏
        const selectAllBar = document.getElementById('select-all-bar');
        const hasCheckboxes = document.querySelectorAll('.approval-checkbox').length > 0;
        if (selectAllBar) {
            selectAllBar.style.display = hasCheckboxes ? 'block' : 'none';
        }
    }

    async function openApplication(appId) {
        console.log('[DEBUG] openApplication called with appId:', appId, 'type:', typeof appId);
        // Directly fetch application detail and display
        try {
            const url = API_BASE_URL + '/applications/' + appId + '/';
            console.log('[DEBUG] Constructed URL:', url, 'API_BASE_URL:', API_BASE_URL, 'appId:', appId);
            const res = await fetch(url, {
                headers: getAuthHeaders()
            });
            if (res.ok) {
                const appData = await res.json();
                // Show application detail using existing openApproval screen
                // But need to adapt to show application data instead of approval data
                showApplicationDetail(appData);
            } else {
                alert('加载详情失败：' + (res.status === 404 ? '申请不存在' : '服务器错误'));
            }
        } catch (e) {
            console.error('Failed to open application:', e);
            alert('加载详情失败：网络错误');
        }
    }

    async function showApplicationDetail(appData) {
        console.log('[DEBUG] showApplicationDetail called with:', appData);
        console.log('[DEBUG] building:', appData.building, 'room_number:', appData.room_number);
        try {
            // Use existing screen-2 to show application detail
            showScreen(2);

            // Use approvals from appData directly
            const approvals = appData.approvals || [];
            console.log('[DEBUG] Approvals:', approvals);

            // Find current user's pending approval
            const myApproval = approvals.find(ap =>
                ap.approver_id === currentUser?.user_id && ap.decision === 'pending'
            );
            currentApprovalId = myApproval ? myApproval.id : null;
            console.log('[DEBUG] Current user approval ID:', currentApprovalId);
            console.log('[DEBUG] Current user ID:', currentUser?.user_id, 'Role:', currentUser?.role);
            console.log('[DEBUG] All approvals approver_ids:', approvals.map(ap => ({ id: ap.id, approver_id: ap.approver_id, approver_name: ap.approver_name, decision: ap.decision })));

            // Fetch attachments
            const attachments = await apiGetAttachments(appData.application_id);
            console.log('[DEBUG] Attachments:', attachments);

            // Get or create detail container
            let detailContainer = document.getElementById('detail-container');
            if (!detailContainer) {
                const approvalSection = document.getElementById('approval-section');
                const parentContainer = approvalSection.parentNode;

                // Remove static mock cards (direct children only, before creating detail-container)
                Array.from(parentContainer.children).forEach(child => {
                    if (child.classList && child.classList.contains('card')) {
                        child.remove();
                    }
                });

                detailContainer = document.createElement('div');
                detailContainer.id = 'detail-container';
                parentContainer.insertBefore(detailContainer, approvalSection);
            }

        const basicInfoHtml = '<div class="card">' +
            '<div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">基本信息</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">申请ID:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + appData.application_id + '</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">学生:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + appData.student_name + ' (' + appData.student_id + ')</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">联系电话:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + (appData.contact_phone || '-') + '</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">离校日期:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + (appData.leave_date || '-') + '</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">楼栋:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + (appData.building || '-') + '</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">房间号:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + (appData.room_number || '-') + '</span>' +
            '</div>' +
            '<div style="display: flex; margin-bottom: 8px;">' +
              '<span style="font-size: 14px; color: #999; width: 80px;">申请原因:</span>' +
              '<span style="font-size: 14px; color: #333; flex: 1;">' + (appData.reason || '-') + '</span>' +
            '</div>' +
          '</div>';

        // Render approvals
        let approvalsHtml = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批记录</div>';
        if (approvals.length > 0) {
            approvals.forEach(ap => {
                const decisionText = ap.decision === 'pending' ? '待审批' : (ap.decision === 'approved' ? '已通过' : '已驳回');
                const stepText = ap.step === 'dorm_manager' ? '宿管审批' : (ap.step === 'counselor' ? '辅导员审批' : '学工部审批');
                approvalsHtml += '<div style="border-top: 1px solid #f0f0f0; padding-top: 8px; margin-top: 8px;">';
                approvalsHtml += '<div style="font-weight: bold; margin-bottom: 4px;">' + stepText + ': ' + decisionText + '</div>';
                approvalsHtml += '<div style="font-size: 14px; color: #666;">审批人: ' + (ap.approver_name || '-') + '</div>';
                if (ap.decided_at) {
                    approvalsHtml += '<div style="font-size: 14px; color: #666;">审批时间: ' + new Date(ap.decided_at).toLocaleString() + '</div>';
                }
                if (ap.comment) {
                    approvalsHtml += '<div style="font-size: 14px; color: #666;">备注: ' + ap.comment + '</div>';
                }
                approvalsHtml += '</div>';
            });
        } else {
            approvalsHtml += '<div style="color: #999;">暂无审批记录</div>';
        }
        approvalsHtml += '</div>';

        // Render attachments
        let attachmentsHtml = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">附件</div>';
        if (attachments && attachments.length > 0) {
            attachments.forEach(att => {
                attachmentsHtml += '<div style="margin-bottom: 8px;"><a href="' + att.file_url + '" target="_blank">' + att.file_name + '</a></div>';
            });
        } else {
            attachmentsHtml += '<div style="color: #999;">无附件</div>';
        }
        attachmentsHtml += '</div>';

        // Back button
        const backButtonHtml = '<div style="padding: 20px;"><button class="btn-outline" onclick="showScreen(1); loadApprovals();" style="width: 100%;">← 返回</button></div>';

        detailContainer.innerHTML = basicInfoHtml + approvalsHtml + attachmentsHtml + backButtonHtml;
            console.log('[DEBUG] Detail rendered successfully');

            // Control approval button visibility
            const approvalSection = document.getElementById('approval-section');
            if (approvalSection) {
                const shouldShow = myApproval &&
                    myApproval.decision === 'pending' &&
                    (currentUser?.role === 'dorm_manager' || currentUser?.role === 'counselor');
                approvalSection.style.display = shouldShow ? 'block' : 'none';
                console.log('[DEBUG] Approval section display:', shouldShow ? 'block' : 'none', 'myApproval:', myApproval);
            }
        } catch (e) {
            console.error('[ERROR] showApplicationDetail failed:', e);
            const container = document.querySelector('#screen-2');
            if (container) {
                container.innerHTML = '<div class="card"><p style="color: #ff4d4f;">加载失败: ' + e.message + '</p></div>';
            }
            alert('显示详情失败：' + e.message);
        }
    }

    function filterApprovals(filter) {
        currentFilter = filter;

        // Update tab active state
        const tabs = document.querySelectorAll('#approval-tabs .filter-tab');
        tabs.forEach((tab, index) => {
            tab.classList.remove('active');
            if ((filter === 'all' && index === 0) ||
                (filter === 'pending' && index === 1) ||
                (filter === 'approved' && index === 2) ||
                (filter === 'rejected' && index === 3)) {
                tab.classList.add('active');
            }
        });

        // Reload list with filter
        if (currentUser && currentUser.role === 'student') {
            loadMyApplications();
        } else {
            loadApprovals();
        }
    }

    function applyAdminFilters() {
        const field = document.getElementById('filter-field').value;
        const value = document.getElementById('filter-value').value.trim();

        adminFilters = {};
        if (value) {
            adminFilters[field] = value;
        }

        loadApprovals();
    }

    function clearAdminFilters() {
        adminFilters = {};
        document.getElementById('filter-value').value = '';
        loadApprovals();
    }

    function showAdminFiltersUI() {
        const adminFiltersEl = document.getElementById('admin-filters');
        if (adminFiltersEl && currentUser && currentUser.role !== 'student') {
            adminFiltersEl.style.display = 'block';
        }
    }

    let currentApprovalId = null;

    function renderStudentApprovalProgress(appData, approvals) {
        const stepNames = {
            'dorm_manager': '宿管员审批',
            'counselor': '辅导员审批'
        };

        const workflow = ['dorm_manager', 'counselor'];
        const appStatus = appData.status;

        let html = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批进度</div>';

        for (let i = workflow.length - 1; i >= 0; i--) {
            const step = workflow[i];
            const stepName = stepNames[step];
            const approval = approvals.find(a => a.step === step);

            let state, tagText, tagCls, dotBg, dotBorder;

            if (appStatus === 'rejected' && approval && approval.decision === 'rejected') {
                state = 'rejected';
                tagText = '已驳回';
                tagCls = 'tag-rejected';
                dotBg = 'var(--status-error)';
                dotBorder = 'var(--status-error)';
            } else if (approval && approval.decision === 'approved') {
                state = 'approved';
                tagText = '已通过';
                tagCls = 'tag-approved';
                dotBg = 'var(--status-success)';
                dotBorder = 'var(--status-success)';
            } else if (appStatus === 'pending_' + step) {
                state = 'pending';
                tagText = '待审批';
                tagCls = 'tag-pending';
                dotBg = 'white';
                dotBorder = 'var(--primary-color)';
            } else {
                state = 'future';
                tagText = '未开始';
                tagCls = 'tag';
                dotBg = '#e8e8e8';
                dotBorder = '#e8e8e8';
            }

            html += '<div style="position: relative; padding-left: 30px; margin-bottom: 20px;">' +
                '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: ' + dotBg + '; border: 2px solid ' + dotBorder + ';"></div>' +
                '<div style="margin-bottom: 6px;"><span style="font-size: 15px; font-weight: 600;">' + stepName + '</span> <span class="tag ' + tagCls + '">' + tagText + '</span></div>';

            if (approval) {
                html += '<div style="font-size: 13px; color: #666;">审批人: ' + (approval.approver_name || '待分配') + '</div>';
                if (approval.decided_at) {
                    html += '<div style="font-size: 13px; color: #666;">时间: ' + new Date(approval.decided_at).toLocaleString() + '</div>';
                }
                if (state === 'rejected') {
                    const comment = approval.comment && approval.comment.trim() ? approval.comment : '审批人未填写驳回原因';
                    html += '<div style="font-size: 13px; color: #ff4d4f; margin-top: 4px; font-weight: 600;">驳回原因: ' + comment + '</div>';
                } else if (approval.comment && approval.comment.trim()) {
                    html += '<div style="font-size: 13px; color: #666; margin-top: 4px;">意见: ' + approval.comment + '</div>';
                }
            }

            html += '</div>';
        }

        html += '</div>';
        return html;
    }

    async function openApproval(id) {
        currentApprovalId = id;
        showScreen(2);

            const detail = await res.json();

                headers: getAuthHeaders()
            });
            const appData = appRes.ok ? await appRes.json() : null;

            // Fetch all approvals for this application
            const approvalsRes = await fetch(API_BASE_URL + '/approvals/?application_id=' + detail.application_id, {
                headers: getAuthHeaders()

                '<div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">基本信息</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">申请ID:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.application_id || detail.id.substring(0,8)) + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">学生:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.student_name || '-') + ' (' + (detail.student_id || '-') + ')</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">联系电话:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.contact_phone || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">离校日期:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.leave_date || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">楼栋号:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.building || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">房间号:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.room_number || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +

                '</div>' +

                        (showDownload ? '<button onclick="handleAttachmentDownload(\'' + att.attachment_id + '\', \'' + att.file_name + '\')" style="font-size: 14px; color: var(--primary-color); background: none; border: none; cursor: pointer;">下载</button>' : '') +
                    '</div>';
                });

            // 动态生成审批时间轴
            const timelineHtml = generateTimeline(detail, appData, allApprovals);

            const cards = container.querySelectorAll('.card');
            if (cards.length > 0) {

            if (cards.length > 1) {

    function generateTimeline(detail, appData, allApprovals = []) {
        const stepNames = {
            'dorm_manager': '宿管员审批',
            'counselor': '辅导员审批'
        };

        const appStatus = appData ? appData.status : detail.step;

        // Always show all workflow steps
        const workflow = ['dorm_manager', 'counselor'];

        // Create approval map by step
        const approvalMap = {};
        allApprovals.forEach(ap => {
            approvalMap[ap.step] = ap;
        });

        // Calculate current level index
        let currentLevel;
        if (appStatus === 'approved') {
            currentLevel = workflow.length;
        } else if (appStatus === 'rejected') {
            currentLevel = workflow.indexOf(detail.step);
        } else if (appStatus.startsWith('pending_')) {
            const pendingStep = appStatus.replace('pending_', '');
            currentLevel = workflow.indexOf(pendingStep);
        } else {
            currentLevel = -1;
        }

        let html = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批记录</div>';

        for (let i = workflow.length - 1; i >= 0; i--) {
            const step = workflow[i];
            const stepName = stepNames[step];
            const isLast = i === 0;
            const approval = approvalMap[step];

            let state, tagText, tagCls, dotBg, dotBorder, showConnector;

            // Use actual approval record if exists
            if (approval) {
                if (approval.decision === 'approved') {
                    state = 'approved';
                    tagText = '已通过';
                    tagCls = 'tag-approved';
                    dotBg = 'var(--status-success)';
                    dotBorder = 'var(--status-success)';
                } else if (approval.decision === 'rejected') {
                    state = 'rejected';
                    tagText = '已驳回';
                    tagCls = 'tag-rejected';
                    dotBg = 'var(--status-error)';
                    dotBorder = 'var(--status-error)';
                } else {
                    state = 'pending';
                    tagText = '待审批';
                    tagCls = 'tag-pending';
                    dotBg = 'white';
                    dotBorder = 'var(--primary-color)';
                }
                showConnector = !isLast;
            } else {
                state = 'future';
                tagText = '未开始';
                tagCls = 'tag';
                dotBg = '#e8e8e8';
                dotBorder = '#e8e8e8';
                showConnector = !isLast;
            }

            html += '<div style="position: relative; padding-left: 30px;' + (isLast ? '' : ' margin-bottom: 20px;') + '">' +
              '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: ' + dotBg + '; border: 2px solid ' + dotBorder + ';"></div>';

            if (showConnector) {
                html += '<div style="position: absolute; left: 14px; top: 16px; bottom: -20px; width: 1px; background: #e8e8e8;"></div>';
            }

            html += '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
                '<span style="font-size: 15px; font-weight: 600;">' + stepName + '</span>' +
                '<span class="tag ' + tagCls + '">' + tagText + '</span>' +
              '</div>';

            if (approval && (state === 'approved' || state === 'pending' || state === 'rejected')) {
                html += '<div style="font-size: 13px; color: #666;">审批人: ' + (approval.approver_name || '待分配') + '</div>';
                if (approval.decided_at) {
                    html += '<div style="font-size: 13px; color: #666;">时间: ' + approval.decided_at + '</div>';
                }
                if (approval.comment) {
                    html += '<div style="font-size: 13px; color: #666; margin-top: 4px;">意见: ' + approval.comment + '</div>';
                }
            }

            html += '</div>';
        }

        html += '<div style="position: relative; padding-left: 30px; margin-top: 20px;">' +
          '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--status-success); border: 2px solid var(--status-success);"></div>' +
          '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
            '<span style="font-size: 15px; font-weight: 600;">提交申请</span>' +
            '<span class="tag tag-approved">已完成</span>' +
          '</div>' +
          '<div style="font-size: 13px; color: #666;">学生已提交</div>' +
        '</div></div>';

        return html;
    }

    async function handleAttachmentPreview(attachmentId) {
        try {
            const url = API_BASE_URL + '/api/attachments/' + attachmentId + '/download/?preview=true';
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            if (!response.ok) throw new Error('预览失败');
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
        } catch (error) {
            showToast('预览失败: ' + error.message, 'error');
        }
    }

    async function handleAttachmentDownload(attachmentId, fileName) {
        try {
            const url = API_BASE_URL + '/api/attachments/' + attachmentId + '/download/';
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            if (!response.ok) throw new Error('下载失败');
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
            showToast('下载成功', 'success');
        } catch (error) {
            showToast('下载失败: ' + error.message, 'error');
        }
    }

    function showExcelPreview(approvals) {
        // Status mapping to Chinese
        const statusMap = {
            'pending_dorm_manager': '待宿管审批',
            'pending_counselor': '待辅导员审批',
            'pending_dean': '待学工部审批',
            'approved': '已通过',
            'rejected': '已拒绝',
            'draft': '草稿'
        };

        const decisionMap = {
            'pending': '待审批',
            'approved': '已通过',
            'rejected': '已拒绝'
        };

        // Build table header (移除申请ID)
        const headers = ['提交人', '学号', '手机号', '离校日期', '楼栋号', '房间号', '提交时间', '审批状态',
                        '宿管员', '宿管审批时间', '宿管审批结果', '辅导员', '辅导员审批时间', '辅导员审批结果'];

        const headerHTML = '<tr>' + headers.map(h => `<th style="padding: 8px; border: 1px solid #ddd; text-align: left; white-space: nowrap;">${h}</th>`).join('') + '</tr>';
        document.getElementById('excelPreviewHeader').innerHTML = headerHTML;

        // Build table body - group approvals by application
        const appMap = new Map();
        approvals.forEach(approval => {
            const appId = approval.application?.id;
            if (appId && !appMap.has(appId)) {
                appMap.set(appId, {
                    application: approval.application,
                    dormApproval: null,
                    counselorApproval: null
                });
            }

            if (appId) {
                const record = appMap.get(appId);
                if (approval.step === 'dorm_manager') {
                    record.dormApproval = approval;
                } else if (approval.step === 'counselor') {
                    record.counselorApproval = approval;
                }
            }
        });

        const rows = Array.from(appMap.values()).map(record => {
            const app = record.application;
            const dorm = record.dormApproval;
            const counselor = record.counselorApproval;

            // Helper function to format date safely
            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return isNaN(date.getTime()) ? '-' : date.toLocaleString();
            };

            return `<tr>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.student_name || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.student_id || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.contact_phone || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.leave_date || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.building || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(app.room_number || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(app.created_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${statusMap[app.status] || escapeHtml(app.status) || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(dorm?.approver_name || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(dorm?.decided_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${dorm?.decision ? decisionMap[dorm.decision] || escapeHtml(dorm.decision) : '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${escapeHtml(counselor?.approver_name || '-')}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(counselor?.decided_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${counselor?.decision ? decisionMap[counselor.decision] || escapeHtml(counselor.decision) : '-'}</td>
            </tr>`;
        }).join('');

        document.getElementById('excelPreviewBody').innerHTML = rows;
        document.getElementById('excelPreviewModal').style.display = 'block';
    }

    async function resubmitApplication() {
        // 获取最新的驳回申请
        const data = await apiGetApplications();
        const rejectedApp = data.results.find(a => a.status === 'rejected');

        if (!rejectedApp) {
            showToast('未找到驳回的申请', 'error');
            return;
        }

        // 填充表单
        document.getElementById('contactPhone').value = rejectedApp.contact_phone || '';
        document.getElementById('applicationReason').value = rejectedApp.reason || '';
        document.getElementById('leaveDate').value = rejectedApp.leave_date || '';

        // 清空附件（需要重新上传）
        uploadedFiles = [];
        renderFileList();

        // 显示提交界面
        showScreen(0);

        // 滚动到顶部
        window.scrollTo(0, 0);
    }

    async function retryFailedApplication() {
        // 获取失败的申请
        const data = await apiGetApplications();
        const failedApp = data.results.find(a => a.status === 'failed');

        if (!failedApp) {
            showToast('未找到失败的申请', 'error');
            return;
        }

        // 填充表单
        document.getElementById('contactPhone').value = failedApp.contact_phone || '';
        document.getElementById('applicationReason').value = failedApp.reason || '';
        document.getElementById('leaveDate').value = failedApp.leave_date || '';

        // 清空附件（需要重新上传）
        uploadedFiles = [];
        renderFileList();

        // 显示提交界面
        showScreen(0);

        // 滚动到顶部
        window.scrollTo(0, 0);
    }

    async function doSubmitApplication() {
        const phone = document.getElementById('contactPhone').value;
        const reason = document.getElementById('applicationReason').value;
        const leaveDate = document.getElementById('leaveDate').value;

        // 验证必填字段
        if (!phone || !leaveDate) {
             showToast('请输入联系电话和离校日期', 'error');
             return;
        }

        // 验证附件（必需）
        if (!uploadedFiles || uploadedFiles.length === 0) {
             showToast('请上传附件材料', 'error');
             return;
        }

        // 验证手机号格式（11位，1开头）
        if (!/^1\d{10}$/.test(phone)) {
             showToast('请输入有效的11位手机号码', 'error');
             return;
        }

        // 验证原因长度（最多500字符）
        if (reason && reason.length > 500) {
             showToast('离校原因不能超过500字', 'error');
             return;
        }

        // 验证离校日期（不能早于今天）
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const selectedDate = new Date(leaveDate);
        if (selectedDate < today) {
             showToast('离校日期不能早于今天', 'error');
             return;
        }

        const btn = event?.target || document.querySelector('#screen-0 .btn-primary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const result = await apiSubmitApplication(phone, reason, leaveDate, uploadedFiles);
            if (result.success) {
                showToast('申请提交成功', 'success');
                document.getElementById('contactPhone').value = '';
                document.getElementById('applicationReason').value = '';
                document.getElementById('leaveDate').value = '';
                uploadedFiles = [];
                renderFileList();

                // Switch to progress view
                showScreen(1);
                loadMyApplications();
            } else {
                showToast(result.error.message || '申请提交失败', 'error');
            }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

  <script>
    // Status mapping
    const statusMap = {
      'pending_dorm_manager': { text: '待宿管审批', class: 'tag-pending' },
      'pending_counselor': { text: '待辅导员审批', class: 'tag-pending' },
      'approved': { text: '已通过', class: 'tag-approved' },
      'rejected': { text: '已拒绝', class: 'tag-rejected' }
    };

    function getStatusDisplay(status) {
      return statusMap[status] || { text: status, class: 'tag' };
    }

    function showScreen(index) {
      document.querySelectorAll('.screen').forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.nav-tabs .nav-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }

    async function doLogin() {
      const userId = document.getElementById('loginUserId').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');
      const btn = event?.target || document.querySelector('#screen-login .btn-primary');

      if (!userId || !password) {
        errorEl.textContent = '请输入用户ID和密码';
        errorEl.style.display = 'block';
        return;
      }

      // Loading state
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const result = await apiLogin(userId, password);

        if (result.success) {
          errorEl.style.display = 'none';
          document.getElementById('loginUserId').value = '';
          document.getElementById('loginPassword').value = '';

          // Show nav tabs and user bar
          document.getElementById('navTabs').style.display = 'flex';
          document.getElementById('userBar').style.display = 'flex';
          document.getElementById('currentUserName').textContent = result.user.name;

          // Store current user for role-based UI control
          currentUser = result.user;

          const roleMap = {
            'student': '学生',
            'dorm_manager': '宿管员',
            'counselor': '辅导员',
            'dean': '学工部'
          };
          document.getElementById('currentUserRole').textContent = '(' + (roleMap[result.user.role] || result.user.role) + ')';

          // Update UI based on role
          updateUIForRole(result.user.role);

          // Hide login screen
          document.getElementById('screen-login').classList.remove('active');

          // Route based on role and application status
          if (result.user.role === 'student') {
            document.getElementById('studentName').textContent = result.user.name;
            document.getElementById('studentId').textContent = result.user.user_id;
            document.getElementById('studentBuilding').textContent = result.user.building || '-';
            document.getElementById('studentRoom').textContent = result.user.room_number || '-';

            // Pre-fill phone if available
            if (result.user.phone) {
              document.getElementById('contactPhone').value = result.user.phone;
            }

            // Check if student has applications
            const applications = await apiGetApplications();
            const hasApplications = applications.results && applications.results.length > 0;
            const hasActiveApplication = hasApplications && applications.results.some(app =>
              app.status.startsWith('pending_') || app.status === 'approved'
            );

            if (hasActiveApplication) {
              showScreen(1); // Show application progress
              loadMyApplications();
            } else {
              showScreen(0); // Show application form (allow submit if no active application)
              if (hasApplications) {
                // Check for failed or rejected applications
                const hasFailed = applications.results.some(a => a.status === 'failed');
                const hasRejected = applications.results.some(a => a.status === 'rejected');

                if (hasFailed) {
                  showFailedApplicationBanner();
                } else if (hasRejected) {
                  showRejectedApplicationBanner();
                }
              }
            }
          } else {
            showScreen(1); // Approval list screen
            loadApprovals();
          }
        } else {
          errorEl.textContent = result.error.error || '登录失败，请检查用户ID和密码';
          errorEl.style.display = 'block';
        }
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function updateUIForRole(role) {
      const isStudent = role === 'student';
      const isDean = role === 'dean';
      const isAdmin = role === 'admin';

      // Hide "学生申请" tab for non-students
      const navTabs = document.querySelectorAll('#navTabs .nav-tab');
      if (navTabs[0]) {
        navTabs[0].style.display = isStudent ? 'block' : 'none';
      }

      // Update nav tab text
      document.getElementById('nav-approval-text').textContent = isStudent ? '我的申请' : (isDean || isAdmin ? '审批查询' : '审批列表');

      // Update list page title and role display
      document.getElementById('list-title').textContent = isStudent ? '我的申请' : (isDean || isAdmin ? '审批查询' : '审批列表');
      document.getElementById('role-display').textContent = (isStudent ? '学生' : isDean ? '学工部' : isAdmin ? '管理员' : role === 'counselor' ? '辅导员' : '宿管员');

      // Show/hide approval section for student/dean/admin
      const approvalSection = document.getElementById('approval-section');
      if (approvalSection) {
        approvalSection.style.display = (isStudent || isDean || isAdmin) ? 'none' : 'block';
      }

      // Show export button for dean and admin roles
      const exportBtn = document.getElementById('export-btn');
      if (exportBtn) {
        exportBtn.style.display = (isDean || isAdmin) ? 'block' : 'none';
      }

      // Show/hide statistics for non-student roles
      const statsContainer = document.getElementById('approval-stats');
      if (statsContainer) {
        statsContainer.style.display = isStudent ? 'none' : 'block';
      }

      // Load statistics for non-student roles
      if (!isStudent) {
        loadApprovalStatistics();
      }
    }

    async function loadApprovalStatistics() {
      if (!currentToken) return;
      try {
        const response = await fetch(API_BASE_URL + '/approvals/statistics/', {
          headers: { 'Authorization': `Bearer ${currentToken}` }
        });
        if (!response.ok) {
          console.error('统计API错误:', response.status);
          document.getElementById('stat-total').textContent = '错误';
          document.getElementById('stat-pending').textContent = '错误';
          document.getElementById('stat-approved').textContent = '错误';
          document.getElementById('stat-rejected').textContent = '错误';
          return;
        }
        const data = await response.json();
        console.log('统计数据:', data);
        document.getElementById('stat-total').textContent = data.total || 0;
        document.getElementById('stat-pending').textContent = data.pending || 0;
        document.getElementById('stat-approved').textContent = data.approved || 0;
        document.getElementById('stat-rejected').textContent = data.rejected || 0;
      } catch (error) {
        console.error('加载统计失败:', error);
        document.getElementById('stat-total').textContent = '错误';
        document.getElementById('stat-pending').textContent = '错误';
        document.getElementById('stat-approved').textContent = '错误';
        document.getElementById('stat-rejected').textContent = '错误';
      }
    }

    function logout() {
      currentToken = null;
      currentUser = null;
      deanDisplayedApps.clear(); // Clear deduplication memory on logout
      approvalOffset = 0;
      approvalHasMore = true;
      uploadedFiles = [];
      // Clear persistent login state to prevent auto-login on refresh
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user_info');
      document.getElementById('navTabs').style.display = 'none';
      document.getElementById('userBar').style.display = 'none';
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-login').classList.add('active');
      renderFileList();
    }

    // File upload management
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
    const ALLOWED_TYPES = ['.jpg', '.jpeg', '.png', '.pdf', '.doc', '.docx'];
    let uploadedFiles = [];

    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadArea = document.querySelector('.upload-area');

    // File selection handler
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // Drag and drop handlers
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--primary-color)';
      uploadArea.style.background = '#fafafa';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      const validFiles = [];
      const errors = [];

      Array.from(files).forEach(file => {
        const ext = '.' + file.name.split('.').pop().toLowerCase();

        if (!ALLOWED_TYPES.includes(ext)) {
          errors.push(`${file.name}: 不支持的文件格式`);
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          errors.push(`${file.name}: 文件大小超过10MB`);
          return;
        }

        validFiles.push(file);
      });

      if (errors.length > 0) {
        errors.forEach(err => showToast(err, 'error'));
      }

      uploadedFiles = uploadedFiles.concat(validFiles);
      renderFileList();
      fileInput.value = ''; // Reset input
    }

    function renderFileList() {
      fileList.innerHTML = uploadedFiles.map((file, index) => `
        <div class="file-item">
          <span style="font-size: 20px;">📄</span>
          <div class="file-info">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatFileSize(file.size)}</div>
          </div>
          <button class="btn-delete" onclick="removeFile(${index})" type="button">×</button>
        </div>
      `).join('');
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderFileList();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// Toast通知函数
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type !== 'info' ? ' ' + type : '');
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'slideIn 0.3s ease-out reverse';
    setTimeout(() => container.removeChild(toast), 300);
  }, 3000);
}

// 批量操作相关
let batchAction = '';

function toggleSelectAll() {
  const selectAll = document.getElementById('select-all-checkbox');
  const checkboxes = document.querySelectorAll('.approval-checkbox');
  checkboxes.forEach(cb => cb.checked = selectAll.checked);
  toggleBatchBar();
}

function toggleBatchBar() {
  const checkboxes = document.querySelectorAll('.approval-checkbox:checked');
  const bar = document.getElementById('batch-action-bar');
  const count = document.getElementById('batch-count');
  const selectCount = document.getElementById('select-count');
  const selectAll = document.getElementById('select-all-checkbox');

  if (checkboxes.length > 0) {
    bar.style.display = 'block';
    count.textContent = `已选 ${checkboxes.length} 项`;
    if (selectCount) selectCount.textContent = `已选 ${checkboxes.length} 项`;
  } else {
    bar.style.display = 'none';
    if (selectCount) selectCount.textContent = '已选 0 项';
  }

  // 更新全选框状态
  const total = document.querySelectorAll('.approval-checkbox').length;
  if (selectAll && total > 0) {
    selectAll.checked = checkboxes.length === total;
    selectAll.indeterminate = checkboxes.length > 0 && checkboxes.length < total;
  }
}

function batchApprove() {
  batchAction = 'approve';
  const count = document.querySelectorAll('.approval-checkbox:checked').length;
  document.getElementById('batch-confirm-text').textContent = `确定批量通过 ${count} 条审批吗？`;
  document.getElementById('batch-confirm-modal').style.display = 'block';
}

function batchReject() {
  batchAction = 'reject';
  const count = document.querySelectorAll('.approval-checkbox:checked').length;
  document.getElementById('batch-confirm-text').textContent = `确定批量驳回 ${count} 条审批吗？`;
  document.getElementById('batch-confirm-modal').style.display = 'block';
}

function closeBatchModal() {
  document.getElementById('batch-confirm-modal').style.display = 'none';
  document.getElementById('batch-comment').value = '';
}

async function confirmBatchAction() {
  const checkboxes = document.querySelectorAll('.approval-checkbox:checked');
  const ids = Array.from(checkboxes).map(cb => cb.dataset.approvalId);
  const comment = document.getElementById('batch-comment').value;

  try {
    const res = await fetch(API_BASE_URL + '/approvals/batch-action/', {
      method: 'POST',
      headers: {...getAuthHeaders(), 'Content-Type': 'application/json'},
      body: JSON.stringify({approval_ids: ids, action: batchAction, comment})
    });

    const data = await res.json();
    closeBatchModal();

    if (res.ok) {
      showToast(`批量${batchAction === 'approve' ? '通过' : '驳回'}成功`, 'success');
      loadApprovals();
      document.getElementById('batch-action-bar').style.display = 'none';
    } else {
      showToast(data.error?.message || '操作失败', 'error');
    }
  } catch (err) {
    closeBatchModal();
    showToast('网络错误', 'error');
  }
}
</script>
