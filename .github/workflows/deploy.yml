name: CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]
  workflow_dispatch:

env:
  DEPLOY_USER: ${{ secrets.DEPLOY_USER }}
  DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
  DEPLOY_PATH: /opt/graduation-leave-system

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.14'

      - name: Install dependencies
        working-directory: ./backend
        run: |
          pip install -r requirements.txt

      - name: Run tests
        working-directory: ./backend
        run: |
          python manage.py test --settings=config.settings.test || exit 1

  build:
    name: Build
    needs: test
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    steps:
      - uses: actions/checkout@v3

      - name: Verify Docker build
        run: |
          cd backend
          docker build -t graduation-backend:${{ github.sha }} .

  deploy:
    name: Deploy to Production
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: production
      url: http://${{ secrets.DEPLOY_HOST }}:7787
    concurrency:
      group: production-deployment
      cancel-in-progress: false
    steps:
      - uses: actions/checkout@v3

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.DEPLOY_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H ${{ secrets.DEPLOY_HOST }} >> ~/.ssh/known_hosts

      - name: Deploy to server
        id: deploy
        run: |
          ssh -i ~/.ssh/deploy_key ${{ env.DEPLOY_USER }}@${{ secrets.DEPLOY_HOST }} << 'EOF'
            set -e
            cd ${{ env.DEPLOY_PATH }}

            # 备份（配置+数据库+Git SHA）
            BACKUP_TIMESTAMP=$(date +%Y%m%d_%H%M%S)
            BACKUP_DIR=/tmp/backup_${BACKUP_TIMESTAMP}
            mkdir -p $BACKUP_DIR
            docker-compose -f docker-compose.prod.yml ps -q > $BACKUP_DIR/containers.txt || true
            tar -czf $BACKUP_DIR/config.tar.gz docker-compose.prod.yml .env.docker .env.prod 2>/dev/null || true
            git rev-parse HEAD > $BACKUP_DIR/git_sha.txt
            docker-compose -f docker-compose.prod.yml exec -T db pg_dump -U postgres graduation_leave | gzip > $BACKUP_DIR/db_dump.sql.gz || true
            echo $BACKUP_TIMESTAMP > /tmp/last_backup_timestamp.txt

            # 更新代码
            git fetch origin
            git checkout main
            git pull origin main

            # 构建镜像
            docker-compose -f docker-compose.prod.yml build backend

            # 数据库迁移检查
            docker-compose -f docker-compose.prod.yml run --rm backend python manage.py migrate --check || echo "Migration check passed"

            # 数据库迁移
            docker-compose -f docker-compose.prod.yml run --rm backend python manage.py migrate --noinput

            # 重启服务
            docker-compose -f docker-compose.prod.yml up -d --remove-orphans

            # 等待启动
            sleep 10

            # 健康检查
            if ! curl -f http://localhost:7787/readyz > /dev/null 2>&1; then
              echo "Health check failed, rolling back..."
              LAST_BACKUP=$(cat /tmp/last_backup_timestamp.txt)
              BACKUP_DIR=/tmp/backup_${LAST_BACKUP}
              docker-compose -f docker-compose.prod.yml down
              tar -xzf $BACKUP_DIR/config.tar.gz
              gunzip -c $BACKUP_DIR/db_dump.sql.gz | docker-compose -f docker-compose.prod.yml exec -T db psql -U postgres graduation_leave
              docker-compose -f docker-compose.prod.yml up -d
              exit 1
            fi

            echo "Deployment successful"
          EOF

      - name: Notify on success
        if: success()
        run: |
          echo "✓ Deployment successful to ${{ secrets.DEPLOY_HOST }}"
          echo "URL: http://${{ secrets.DEPLOY_HOST }}:7787"

      - name: Notify on failure
        if: failure()
        run: |
          echo "✗ Deployment failed"
          echo "Check logs: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          exit 1
