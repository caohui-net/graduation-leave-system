<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SSO登录中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div id="message">正在登录...</div>
  </div>

  <script>
    // 管理端SSO回调 - 直接跳转到后端callback处理
    // 与mobile-sso-callback.html统一流程
    window.onload = function() {
      // 获取当前URL的所有参数
      const currentParams = window.location.search;

      // 直接跳转到后端callback，保留所有参数
      // callback_views.py会处理管理端参数（authorization+username）
      window.location.href = 'http://218.75.196.218:7787/api/sso/qingganlian/callback' + currentParams;
    };
  </script>
</body>
</html>
