<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
      padding: 20px;
    }
    .container {
      max-width: 1200px;
      margin: 0 auto;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
      padding: 30px;
    }
    .header {
      border-bottom: 2px solid #3498db;
      padding-bottom: 20px;
      margin-bottom: 30px;
    }
    .header h1 {
      color: #2c3e50;
      font-size: 28px;
      margin-bottom: 10px;
    }
    .user-info {
      background: #ecf0f1;
      padding: 15px;
      border-radius: 6px;
      margin-bottom: 20px;
    }
    .user-info p {
      margin: 8px 0;
      color: #34495e;
    }
    .user-info strong {
      color: #2c3e50;
      display: inline-block;
      width: 100px;
    }
    .token-display {
      background: #f8f9fa;
      padding: 15px;
      border-radius: 6px;
      border-left: 4px solid #27ae60;
      margin-bottom: 20px;
    }
    .token-display h3 {
      color: #27ae60;
      margin-bottom: 10px;
      font-size: 16px;
    }
    .token-display code {
      display: block;
      background: white;
      padding: 10px;
      border-radius: 4px;
      font-size: 12px;
      word-break: break-all;
      color: #555;
    }
    .actions {
      margin-top: 30px;
    }
    .btn {
      display: inline-block;
      padding: 10px 20px;
      margin-right: 10px;
      border: none;
      border-radius: 5px;
      cursor: pointer;
      font-size: 14px;
      text-decoration: none;
      transition: all 0.3s;
    }
    .btn-primary {
      background: #3498db;
      color: white;
    }
    .btn-primary:hover {
      background: #2980b9;
    }
    .btn-danger {
      background: #e74c3c;
      color: white;
    }
    .btn-danger:hover {
      background: #c0392b;
    }
    .success-badge {
      display: inline-block;
      background: #27ae60;
      color: white;
      padding: 5px 15px;
      border-radius: 20px;
      font-size: 14px;
      margin-left: 10px;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🎓 毕业生离校系统 - 管理后台 <span class="success-badge">✓ SSO登录成功</span></h1>
    </div>

    <div class="user-info" id="userInfo">
      <h3>用户信息</h3>
      <p><strong>用户ID:</strong> <span id="userId">-</span></p>
      <p><strong>用户名:</strong> <span id="username">-</span></p>
      <p><strong>真实姓名:</strong> <span id="realName">-</span></p>
      <p><strong>角色:</strong> <span id="role">-</span></p>
      <p><strong>手机号:</strong> <span id="phone">-</span></p>
    </div>

    <div class="token-display">
      <h3>🔑 JWT Token (用于API调用)</h3>
      <code id="tokenDisplay">-</code>
    </div>

    <div class="actions">
      <button class="btn btn-primary" onclick="testAPI()">测试API调用</button>
      <button class="btn btn-danger" onclick="logout()">退出登录</button>
    </div>
  </div>

  <script>
    // 加载用户信息
    function loadUserInfo() {
      const token = localStorage.getItem('auth_token');
      const userInfo = JSON.parse(localStorage.getItem('user_info') || '{}');

      if (!token) {
        alert('未找到登录信息，请重新登录');
        window.location.href = '/';
        return;
      }

      // 显示用户信息
      document.getElementById('userId').textContent = userInfo.id || '-';
      document.getElementById('username').textContent = userInfo.username || '-';
      document.getElementById('realName').textContent = userInfo.real_name || '-';
      document.getElementById('role').textContent = userInfo.role || '-';
      document.getElementById('phone').textContent = userInfo.phone || '-';

      // 显示token（截断显示）
      const displayToken = token.length > 100 ? token.substring(0, 100) + '...' : token;
      document.getElementById('tokenDisplay').textContent = displayToken;
    }

    // 测试API调用
    function testAPI() {
      const token = localStorage.getItem('auth_token');
      alert('Token已保存，可用于后续API调用\n\n使用方式：\nAuthorization: Bearer ' + token);
    }

    // 退出登录
    function logout() {
      localStorage.removeItem('auth_token');
      localStorage.removeItem('user_info');
      alert('已退出登录');
      window.location.href = '/';
    }

    // 页面加载时执行
    window.onload = loadUserInfo;
  </script>
</body>
</html>
