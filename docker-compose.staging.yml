version: '3.8'

services:
  db:
    ports:
      - "15432:5432"

  backend:
    command: >
      sh -c "pip install -e /biz-core --quiet &&
             python manage.py migrate --noinput &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - /home/caohui/projects/biz-core:/biz-core
      - media_data:/app/media
    ports:
      - "17787:8000"
    env_file:
      - .env.staging
