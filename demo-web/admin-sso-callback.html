<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SSO登录中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div id="message">正在登录...</div>
  </div>

  <script>
    // 管理端SSO回调 - 直接跳转到后端callback处理
    // 与mobile-sso-callback.html统一流程
    window.onload = function() {
      // 获取当前URL的所有参数
      const params = new URLSearchParams(window.location.search);

      // 提取Authorization token（支持大小写）
      let authorization = params.get('authorization') || params.get('Authorization');

      // 去除bearer前缀
      if (authorization && authorization.toLowerCase().startsWith('bearer ')) {
        authorization = authorization.substring(7).trim();
      }

      // 如果缺少username，尝试从JWT token的sub字段提取
      if (authorization && !params.get('username') && !params.get('user_id')) {
        try {
          // 简单JWT解析（不验证签名，只读取payload）
          const parts = authorization.split('.');
          if (parts.length === 3) {
            const payload = JSON.parse(atob(parts[1]));
            const userId = payload.sub || payload.user_id || payload.username;
            if (userId) {
              params.set('username', String(userId));
              console.log('Extracted username from JWT:', userId);
            }
          }
        } catch (e) {
          console.warn('Failed to extract username from JWT:', e);
        }
      }

      // 重新构造参数（确保authorization是小写）
      params.delete('Authorization');  // 删除大写版本
      if (authorization) {
        params.set('authorization', authorization);  // 使用小写
      }

      // 添加时间戳避免callback接口被缓存
      params.set('_t', Date.now());

      // 跳转到后端callback
      const backendUrl = `http://${window.location.hostname}:7787/api/sso/qingganlian/callback`;
      window.location.href = backendUrl + '?' + params.toString();
    };
  </script>
</body>
</html>
