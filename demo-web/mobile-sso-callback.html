<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO登录中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #e74c3c;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div id="message">正在登录...</div>
  </div>

  <script>
    // 移动端SSO回调 - 简化流程（不调用青橄榄API）
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const saas_wap_token = params.get('saas_wap_token');

      if (!saas_wap_token) {
        document.getElementById('message').textContent = '错误：未收到token';
        return;
      }

      // 从token提取用户ID（末尾6-10位数字）
      const match = saas_wap_token.match(/(\d{6,10})$/);
      const user_id = match ? match[1] : null;

      if (!user_id) {
        document.getElementById('message').textContent = '错误：无法解析用户ID';
        return;
      }

      document.getElementById('message').textContent = '正在登录...';

      // 调用mobile/login简化接口
      fetch('http://218.75.196.218:7787/api/sso/qingganlian/mobile/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          authorization: saas_wap_token,
          user_id: user_id
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.token && data.user) {
          const userInfoStr = encodeURIComponent(JSON.stringify(data.user));
          window.location.href = `http://218.75.196.218:7788/sso-receiver.html?token=${data.token}&user_info=${userInfoStr}`;
        } else {
          document.getElementById('message').textContent = '登录失败: ' + (data.error || '未知错误');
        }
      })
      .catch(err => {
        document.getElementById('message').textContent = '请求失败: ' + err.message;
      });
    };
  </script>
</body>
</html>
