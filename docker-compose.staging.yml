version: '3.8'

services:
  db:
    image: postgres:15-alpine
    restart: always
    environment:
      POSTGRES_DB: graduation_leave
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "15432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: always
    command: >
      sh -c "pip install -e /biz-core --quiet &&
             python manage.py runserver 0.0.0.0:8000"
    volumes:
      - ./backend:/app
      - /home/caohui/projects/biz-core:/biz-core
      - media_data:/app/media
    ports:
      - "17787:8000"
    env_file:
      - .env.staging
    depends_on:
      db:
        condition: service_healthy

volumes:
  postgres_data:
  media_data:
