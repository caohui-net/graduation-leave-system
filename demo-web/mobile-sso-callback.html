<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SSO登录中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #e74c3c;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div id="message">正在登录...</div>
  </div>

  <script>
    // 青橄榄SSO回调 - 移动端使用saas_wap_token流程
    window.onload = function() {
      // 获取青橄榄回调参数
      const params = new URLSearchParams(window.location.search);
      const saas_wap_token = params.get('saas_wap_token');
      const tenantCode = params.get('tenantCode') || 'S10405';

      // 调试信息
      console.log('移动端callback收到:');
      console.log('- saas_wap_token:', saas_wap_token);
      console.log('- tenantCode:', tenantCode);

      if (!saas_wap_token) {
        document.getElementById('message').textContent = '错误：未收到saas_wap_token';
        return;
      }

      document.getElementById('message').textContent = '正在登录...';

      // 调用后端mobile_saas_login接口处理
      fetch('http://218.75.196.218:7787/api/sso/qingganlian/mobile/saas-login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          saas_wap_token: saas_wap_token,
          tenant_code: tenantCode
        })
      })
      .then(res => {
        console.log('Response status:', res.status);
        console.log('Response Content-Type:', res.headers.get('content-type'));

        // 先获取响应文本
        return res.text().then(text => {
          console.log('Response body:', text.substring(0, 500));

          // 尝试解析为JSON
          try {
            const data = JSON.parse(text);
            return { ok: res.ok, status: res.status, data: data };
          } catch (e) {
            console.error('JSON parse error:', e);
            return { ok: false, status: res.status, error: 'Invalid JSON', text: text };
          }
        });
      })
      .then(result => {
        if (result.ok && result.data && result.data.token) {
          // 登录成功
          const userInfoStr = encodeURIComponent(JSON.stringify(result.data.user));
          window.location.href = `http://218.75.196.218:7788/sso-receiver.html?token=${result.data.token}&user_info=${userInfoStr}`;
        } else {
          // 登录失败
          const errMsg = result.data?.error || result.error || result.text?.substring(0, 200) || '未知错误';
          document.getElementById('message').textContent = '登录失败: ' + errMsg;
          console.error('Login failed:', result);
        }
      })
      .catch(err => {
        console.error('Fetch error:', err);
        document.getElementById('message').textContent = '请求失败: ' + err.message;
      });
    };
  </script>
</body>
</html>
