<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>SSO登录中...</title>
  <style>
    body {
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      background: #f5f5f5;
    }
    .loading {
      text-align: center;
    }
    .spinner {
      border: 3px solid #f3f3f3;
      border-top: 3px solid #3498db;
      border-radius: 50%;
      width: 40px;
      height: 40px;
      animation: spin 1s linear infinite;
      margin: 0 auto 20px;
    }
    @keyframes spin {
      0% { transform: rotate(0deg); }
      100% { transform: rotate(360deg); }
    }
    .error {
      color: #e74c3c;
      padding: 20px;
      background: white;
      border-radius: 8px;
      box-shadow: 0 2px 8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>
  <div class="loading">
    <div class="spinner"></div>
    <div id="message">正在登录...</div>
  </div>

  <script>
    // 移动端SSO回调
    window.onload = function() {
      const params = new URLSearchParams(window.location.search);
      const saas_wap_token = params.get('saas_wap_token');

      if (!saas_wap_token) {
        document.getElementById('message').textContent = '错误：未收到认证令牌';
        return;
      }

      // POST到后端获取用户信息
      fetch('http://218.75.196.218:7787/api/sso/qingganlian/mobile/saas-login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          saas_wap_token: saas_wap_token,
          tenant_code: params.get('tenantCode') || 'S10405'
        })
      })
      .then(res => res.json())
      .then(data => {
        if (data.token && data.user) {
          const userInfoStr = encodeURIComponent(JSON.stringify(data.user));
          window.location.replace(`http://218.75.196.218:7788/sso-receiver.html?token=${data.token}&user_info=${userInfoStr}`);
        } else {
          document.getElementById('message').textContent = '登录失败，请重试';
        }
      })
      .catch(err => {
        document.getElementById('message').textContent = '网络错误，请重试';
      });
    };
  </script>
</body>
</html>
