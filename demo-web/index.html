<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>毕业离校申请系统 - UI Demo</title>
  <link rel="stylesheet" href="css/global.css">
  <script src="js/api.js?v=20260607-1735"></script>
<script>
    async function loadMyApplications() {
        if (!currentToken) return;
        const data = await apiGetApplications();
        const listContainer = document.getElementById('approval-list-container');

        if (data.results && data.results.length > 0) {
            let htmlStr = '';
            data.results.forEach(app => {
                const statusDisplay = getStatusDisplay(app.status);
                htmlStr += '<div class="card" style="cursor: pointer;">' +
                  '<div class="flex-row justify-between align-center" style="margin-bottom: 8px;">' +
                    '<span style="font-size: 16px; font-weight: bold;">申请 ' + app.id.substring(0,8) + '</span>' +
                    '<span class="tag ' + statusDisplay.class + '">' + statusDisplay.text + '</span>' +
                  '</div>' +
                  '<div style="margin-bottom: 4px;">' +
                    '<span style="font-size: 14px; color: #999; margin-right: 8px;">离校日期:</span>' +
                    '<span style="font-size: 14px; color: #333;">' + (app.leave_date || '-') + '</span>' +
                  '</div>' +
                  '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;">' +
                    '<span style="font-size: 12px; color: #999;">' + new Date(app.created_at).toLocaleString() + '</span>' +
                  '</div>' +
                '</div>';
            });
            listContainer.innerHTML = htmlStr;
        } else {
            listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">暂无申请记录</div>';
        }
    }

    async function loadApprovals() {
        if (!currentToken) return;
        const data = await apiGetApprovals();
        const listContainer = document.getElementById('approval-list-container');

        // Status map based on backend expectations
        const statusMap = {
            'pending_dorm_manager': { text: '待宿管审批', cls: 'tag-pending' },
            'pending_counselor': { text: '待辅导员审批', cls: 'tag-pending' },
            'pending_dean': { text: '待学工部审批', cls: 'tag-pending' },
            'approved': { text: '已通过', cls: 'tag-approved' },
            'rejected': { text: '已拒绝', cls: 'tag-rejected' }
        };

        if (data.results && data.results.length > 0) {
            let htmlStr = '';
            data.results.forEach(approval => {
                const application = approval.application || {};
                const appStatus = application.status || 'unknown';
                const step = statusMap[appStatus] ? statusMap[appStatus].text : appStatus;
                const tagCls = statusMap[appStatus] ? statusMap[appStatus].cls : 'tag-pending';

                htmlStr += '<div class="card" onclick="openApproval(\'' + approval.id + '\')" style="cursor: pointer;">' +
                  '<div class="flex-row justify-between align-center" style="margin-bottom: 8px;">' +
                    '<span style="font-size: 16px; font-weight: bold;">申请 ' + (application.id ? application.id.substring(0,8) : approval.id.substring(0,8)) + '</span>' +
                    '<span class="tag ' + tagCls + '">' + step + '</span>' +
                  '</div>' +
                  '<div style="margin-bottom: 4px;">' +
                    '<span style="font-size: 14px; color: #999; margin-right: 8px;">学生:</span>' +
                    '<span style="font-size: 14px; color: #333;">' + (application.student_name || '-') + ' (' + (application.student_id || '-') + ')</span>' +
                  '</div>' +
                  '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;">' +
                    '<span style="font-size: 12px; color: #999;">' + new Date(approval.created_at || application.created_at).toLocaleString() + '</span>' +
                  '</div>' +
                '</div>';
            });
            listContainer.innerHTML = htmlStr;
        } else {
             listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">暂无数据</div>';
        }
    }
    
    let currentApprovalId = null;
    async function openApproval(id) {
        currentApprovalId = id;
        showScreen(2);

        const res = await fetch(API_BASE_URL + '/approvals/' + id + '/', {
            headers: getAuthHeaders()
        });
        if (res.ok) {
            const detail = await res.json();

            const appRes = await fetch(API_BASE_URL + '/applications/' + detail.application_id + '/', {
                headers: getAuthHeaders()
            });
            const appData = appRes.ok ? await appRes.json() : null;

            // Fetch attachments
            const attachments = await apiGetAttachments(detail.application_id);

            const container = document.querySelector('#screen-2');

            const basicInfoHtml = '<div class="card">' +
                '<div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">基本信息</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">申请ID:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.application_id || detail.id.substring(0,8)) + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">学生:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.student_name || '-') + ' (' + (detail.student_id || '-') + ')</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">联系电话:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.contact_phone || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">申请原因:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.reason || '无') + '</span>' +
                '</div>' +
              '</div>';

            // Generate attachment HTML
            let attachmentHtml = '';
            if (attachments && attachments.length > 0) {
                attachmentHtml = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">附件材料</div>';
                attachments.forEach(att => {
                    attachmentHtml += '<div style="display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">' +
                        '<span style="font-size: 14px; color: #333; flex: 1;">' + (att.original_filename || att.file) + '</span>' +
                        '<a href="' + att.file + '" download style="font-size: 14px; color: var(--primary-color); text-decoration: none;">下载</a>' +
                    '</div>';
                });
                attachmentHtml += '</div>';
            }

            // 动态生成审批时间轴
            const timelineHtml = generateTimeline(detail, appData);

            const cards = container.querySelectorAll('.card');
            if (cards.length > 0) {
                cards[0].outerHTML = basicInfoHtml;
            }
            if (cards.length > 1) {
                if (attachmentHtml) {
                    cards[1].outerHTML = attachmentHtml + timelineHtml;
                } else {
                    cards[1].outerHTML = timelineHtml;
                }
            }
        }
    }

    function generateTimeline(detail, appData) {
        const stepNames = {
            'dorm_manager': '宿管员审批',
            'counselor': '辅导员审批',
            'dean': '学工部审批'
        };

        const appStatus = appData ? appData.status : detail.step;
        const workflow = ['dorm_manager', 'counselor', 'dean'];

        // Calculate current level index
        let currentLevel;
        if (appStatus === 'approved') {
            currentLevel = workflow.length;
        } else if (appStatus === 'rejected') {
            currentLevel = workflow.indexOf(detail.step);
        } else if (appStatus.startsWith('pending_')) {
            const pendingStep = appStatus.replace('pending_', '');
            currentLevel = workflow.indexOf(pendingStep);
        } else {
            currentLevel = -1;
        }

        let html = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批记录</div>';

        for (let i = workflow.length - 1; i >= 0; i--) {
            const step = workflow[i];
            const stepName = stepNames[step];
            const isLast = i === 0;

            let state, tagText, tagCls, dotBg, dotBorder, showConnector;

            // Index-based comparison
            if (i < currentLevel || appStatus === 'approved') {
                state = 'approved';
                tagText = '已通过';
                tagCls = 'tag-approved';
                dotBg = 'var(--status-success)';
                dotBorder = 'var(--status-success)';
                showConnector = !isLast;
            } else if (i === currentLevel && appStatus !== 'rejected') {
                state = 'pending';
                tagText = '待审批';
                tagCls = 'tag-pending';
                dotBg = 'white';
                dotBorder = 'var(--primary-color)';
                showConnector = !isLast;
            } else if (appStatus === 'rejected' && detail.step === step) {
                state = 'rejected';
                tagText = '已驳回';
                tagCls = 'tag-rejected';
                dotBg = 'var(--status-error)';
                dotBorder = 'var(--status-error)';
                showConnector = !isLast;
            } else {
                state = 'future';
                tagText = '未开始';
                tagCls = 'tag';
                dotBg = '#e8e8e8';
                dotBorder = '#e8e8e8';
                showConnector = !isLast;
            }

            html += '<div style="position: relative; padding-left: 30px;' + (isLast ? '' : ' margin-bottom: 20px;') + '">' +
              '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: ' + dotBg + '; border: 2px solid ' + dotBorder + ';"></div>';

            if (showConnector) {
                html += '<div style="position: absolute; left: 14px; top: 16px; bottom: -20px; width: 1px; background: #e8e8e8;"></div>';
            }

            html += '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
                '<span style="font-size: 15px; font-weight: 600;">' + stepName + '</span>' +
                '<span class="tag ' + tagCls + '">' + tagText + '</span>' +
              '</div>';

            if (state === 'approved' || state === 'pending' || state === 'rejected') {
                if (detail.step === step) {
                    html += '<div style="font-size: 13px; color: #666;">审批人: ' + (detail.approver_name || '待分配') + '</div>';
                    if (detail.decided_at) {
                        html += '<div style="font-size: 13px; color: #666;">时间: ' + detail.decided_at + '</div>';
                    }
                    if (detail.comment) {
                        html += '<div style="font-size: 13px; color: #666; margin-top: 4px;">意见: ' + detail.comment + '</div>';
                    }
                }
            }

            html += '</div>';
        }

        html += '<div style="position: relative; padding-left: 30px; margin-top: 20px;">' +
          '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--status-success); border: 2px solid var(--status-success);"></div>' +
          '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
            '<span style="font-size: 15px; font-weight: 600;">提交申请</span>' +
            '<span class="tag tag-approved">已完成</span>' +
          '</div>' +
          '<div style="font-size: 13px; color: #666;">学生已提交</div>' +
        '</div></div>';

        return html;
    }
    
    async function doApprove() {
        if(!currentApprovalId) return;
        const comment = document.getElementById('approvalComment').value;
        const btn = event?.target || document.querySelector('#approval-actions .btn-primary');

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '处理中...';

        try {
            const ok = await apiApprove(currentApprovalId, comment);
            if(ok) { showToast('审批通过', 'success'); showScreen(1); loadApprovals(); }
            else { showToast('审批失败', 'error'); }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    async function doReject() {
        if(!currentApprovalId) return;
        const comment = document.getElementById('approvalComment').value;
        const btn = event?.target || document.querySelector('#approval-actions .btn-outline');

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '处理中...';

        try {
            const ok = await apiReject(currentApprovalId, comment);
            if(ok) { showToast('审批拒绝', 'success'); showScreen(1); loadApprovals(); }
            else { showToast('审批失败', 'error'); }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }
    
    async function doSubmitApplication() {
        const phone = document.getElementById('contactPhone').value;
        const reason = document.getElementById('applicationReason').value;
        const leaveDate = document.getElementById('leaveDate').value;

        // 验证必填字段
        if (!phone || !leaveDate) {
             showToast('请输入联系电话和离校日期', 'error');
             return;
        }

        // 验证手机号格式（11位，1开头）
        if (!/^1\d{10}$/.test(phone)) {
             showToast('请输入有效的11位手机号码', 'error');
             return;
        }

        // 验证原因长度（最多500字符）
        if (reason && reason.length > 500) {
             showToast('离校原因不能超过500字', 'error');
             return;
        }

        // 验证离校日期（不能早于今天）
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const selectedDate = new Date(leaveDate);
        if (selectedDate < today) {
             showToast('离校日期不能早于今天', 'error');
             return;
        }

        const btn = event?.target || document.querySelector('#screen-0 .btn-primary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const result = await apiSubmitApplication(phone, reason, leaveDate, uploadedFiles);
            if (result.success) {
                showToast('申请提交成功', 'success');
                document.getElementById('contactPhone').value = '';
                document.getElementById('applicationReason').value = '';
                document.getElementById('leaveDate').value = '';
                uploadedFiles = [];
                renderFileList();

                // Switch to progress view
                showScreen(1);
                loadMyApplications();
            } else {
                showToast(result.error.message || '申请提交失败', 'error');
            }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }
</script>
  <style>
    /* 导航标签 */
    .nav-tabs {
      background: white;
      display: flex;
      border-bottom: 1px solid #f0f0f0;
      position: sticky;
      top: 0;
      z-index: 10;
    }
    .nav-tab {
      flex: 1;
      text-align: center;
      padding: 12px 0;
      font-size: 14px;
      color: #666;
      cursor: pointer;
      position: relative;
      border: none;
      background: none;
    }
    .nav-tab.active {
      color: var(--primary-color);
      font-weight: 600;
    }
    .nav-tab.active::after {
      content: '';
      position: absolute;
      bottom: 0;
      left: 50%;
      transform: translateX(-50%);
      width: 30px;
      height: 2px;
      background: var(--primary-color);
      border-radius: 1px;
    }

    /* 响应式：桌面端Tab导航优化 */
    @media (min-width: 1024px) {
      .nav-tabs {
        padding: 0 40px;
      }
      .nav-tab {
        padding: 16px 24px;
        font-size: 16px;
      }
      .nav-tab.active::after {
        width: 50px;
        height: 3px;
      }
    }

    /* 附件上传区域样式 */
    .upload-area {
      border: 2px dashed #d9d9d9;
      border-radius: 8px;
      padding: 30px;
      text-align: center;
      cursor: pointer;
      transition: all 0.3s;
    }
    .upload-area:hover {
      border-color: var(--primary-color);
      background: #fafafa;
    }
    .file-item {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px;
      background: #fafafa;
      border-radius: 4px;
      margin-bottom: 8px;
    }
    .file-info {
      flex: 1;
      margin-left: 8px;
    }
    .file-name {
      font-size: 14px;
      color: #333;
    }
    .file-size {
      font-size: 12px;
      color: #999;
    }
    .btn-delete {
      background: none;
      border: none;
      color: var(--status-error);
      font-size: 20px;
      cursor: pointer;
      padding: 0 8px;
    }

    .screen {
      display: none;
      min-height: calc(100vh - 45px);
    }
    .screen.active {
      display: block;
    }
    .login-screen {
      display: none;
      min-height: calc(100vh - 45px);
    }
    .login-screen.active {
      display: block;
    }
  </style>
</head>
<body>
  <!-- 顶部导航 -->
  <div class="nav-tabs" id="navTabs" style="display: none;">
    <button class="nav-tab active" onclick="showScreen(0)">学生申请</button>
    <button class="nav-tab" onclick="showScreen(1)"><span id="nav-approval-text">审批列表</span></button>
    <button class="nav-tab" onclick="showScreen(2)">申请详情</button>
  </div>

  <!-- 登录状态栏 -->
  <div id="userBar" style="background: white; padding: 8px 16px; border-bottom: 1px solid #f0f0f0; display: none; align-items: center; justify-content: space-between;">
    <div>
      <span style="font-size: 14px; color: #666;">当前用户:</span>
      <span id="currentUserName" style="font-size: 14px; font-weight: 500; margin-left: 8px;"></span>
      <span id="currentUserRole" style="font-size: 12px; color: #999; margin-left: 8px;"></span>
    </div>
    <button onclick="logout()" style="padding: 4px 12px; border: 1px solid #d9d9d9; border-radius: 4px; background: white; cursor: pointer;">退出登录</button>
  </div>

  <!-- 登录屏幕 -->
  <div class="login-screen active" id="screen-login">
    <div style="padding: 40px 20px; max-width: 400px; margin: 0 auto;">
      <div class="card">
        <div style="text-align: center; margin-bottom: 30px;">
          <h2 style="color: var(--primary-color); margin-bottom: 8px;">毕业离校申请系统</h2>
          <p style="color: #666; font-size: 14px;">请登录以继续</p>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">用户ID</label>
          <input id="loginUserId" type="text" style="width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;" placeholder="请输入用户ID（如 2020001）" required>
        </div>
        <div style="margin-bottom: 24px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">密码</label>
          <input id="loginPassword" type="password" style="width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;" placeholder="请输入密码" required>
        </div>
        <div id="loginError" style="display: none; padding: 10px; background: #fff2f0; border: 1px solid #ffccc7; border-radius: 4px; color: #cf1322; font-size: 14px; margin-bottom: 16px;"></div>
        <button class="btn-primary" onclick="doLogin()">登录</button>
      </div>
    </div>
  </div>

  <div class="screen" id="screen-0">
    <div style="padding: 20px;">
      <!-- 用户信息卡片 -->
      <div class="card" style="margin-bottom: 20px;">
        <div style="font-size: 16px; font-weight: 600; color: var(--primary-color); margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0;">
          申请人信息
        </div>
        <div style="display: flex; align-items: center; padding: 10px 0;">
          <span style="font-size: 14px; color: #666; width: 80px;">姓名</span>
          <span id="studentName" style="font-size: 14px; color: #333;">-</span>
        </div>
        <div style="display: flex; align-items: center; padding: 10px 0;">
          <span style="font-size: 14px; color: #666; width: 80px;">学号</span>
          <span id="studentId" style="font-size: 14px; color: #333;">-</span>
        </div>
      </div>

      <!-- 表单卡片 -->
      <div class="card">
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">联系电话</label>
          <input id="contactPhone" type="tel" name="contact_phone" maxlength="20" inputmode="numeric" style="width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;" placeholder="请输入联系电话" required>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">离校原因</label>
          <textarea id="applicationReason" style="width: 100%; min-height: 120px; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;" placeholder="请输入离校原因"></textarea>
          <span style="display: block; text-align: right; font-size: 12px; color: #999; margin-top: 4px;">0/500</span>
        </div>
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">离校日期</label>
          <input id="leaveDate" type="date" name="leave_date" style="width: 100%; padding: 12px; border: 1px solid #d9d9d9; border-radius: 4px; font-size: 14px;" required>
        </div>

        <!-- 附件上传区域 -->
        <div style="margin-bottom: 20px;">
          <label style="display: block; font-size: 14px; margin-bottom: 8px; font-weight: 500;">附件材料（可选）</label>
          <div class="upload-zone">
            <input type="file" id="fileInput" multiple accept=".jpg,.jpeg,.png,.pdf,.doc,.docx" style="display: none;">
            <div class="upload-area" onclick="document.getElementById('fileInput').click()">
              <div style="font-size: 40px; color: #999; margin-bottom: 8px;">📎</div>
              <div style="font-size: 14px; color: #666;">点击或拖拽文件到此处上传</div>
              <div style="font-size: 12px; color: #999; margin-top: 4px;">支持jpg/png/pdf/doc/docx，单文件不超过10MB</div>
            </div>
          </div>
          <!-- 文件列表 -->
          <div id="fileList" style="margin-top: 12px;"></div>
        </div>

        <button class="btn-primary" onclick="doSubmitApplication()">提交申请</button>
      </div>
    </div>
  </div>

  <!-- 屏幕2: 审批列表页 -->
  <div class="screen" id="screen-1">
    <div style="background: white; padding: 16px; display: flex; justify-content: space-between; align-items: center;">
      <div style="font-size: 18px; font-weight: bold;" id="list-title">审批列表</div>
      <div style="font-size: 12px; color: #999;" id="role-display">宿管员</div>
    </div>

    <!-- Tab切换 -->
    <div style="background: white; display: flex; border-bottom: 1px solid #f0f0f0;">
      <div class="nav-tab active" style="flex: 1;">全部</div>
      <div class="nav-tab" style="flex: 1;">待审批</div>
      <div class="nav-tab" style="flex: 1;">已审批</div>
    </div>

    <div style="padding: 10px;" id="approval-list-container">
      <!-- 列表项 -->
      <div style="text-align:center; padding: 20px; color:#999;">加载中...</div>
    </div>
  </div>

  <!-- 屏幕3: 申请详情页 -->
  <div class="screen" id="screen-2">
    <div style="background: white; padding: 16px;">
      <div style="font-size: 18px; font-weight: bold;">申请详情</div>
    </div>

    <div style="padding: 10px;">
      <!-- 基本信息 -->
      <div class="card">
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">基本信息</div>
        <div style="display: flex; margin-bottom: 8px;">
          <span style="font-size: 14px; color: #999; width: 80px;">申请ID:</span>
          <span style="font-size: 14px; color: #333; flex: 1;">-</span>
        </div>
        <div style="display: flex; margin-bottom: 8px;">
          <span style="font-size: 14px; color: #999; width: 80px;">学生:</span>
          <span style="font-size: 14px; color: #333; flex: 1;">-</span>
        </div>
        <div style="display: flex; margin-bottom: 8px;">
          <span style="font-size: 14px; color: #999; width: 80px;">离校日期:</span>
          <span style="font-size: 14px; color: #333; flex: 1;">-</span>
        </div>
        <div style="display: flex; margin-bottom: 8px;">
          <span style="font-size: 14px; color: #999; width: 80px;">申请原因:</span>
          <span style="font-size: 14px; color: #333; flex: 1;">-</span>
        </div>
      </div>

      <!-- 审批记录时间轴 -->
      <div class="card">
        <div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批记录</div>

        <!-- 时间轴项 -->
        <div style="position: relative; padding-left: 30px; margin-bottom: 20px;">
          <div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: white; border: 2px solid var(--primary-color);"></div>
          <div style="position: absolute; left: 14px; top: 16px; bottom: -20px; width: 1px; background: #e8e8e8;"></div>
          <div class="flex-row justify-between align-center" style="margin-bottom: 6px;">
            <span style="font-size: 15px; font-weight: 600;">宿管员审批</span>
            <span class="tag tag-pending">待审批</span>
          </div>
          <div style="font-size: 13px; color: #666;">审批人: 李老师</div>
        </div>

        <div style="position: relative; padding-left: 30px; margin-bottom: 20px;">
          <div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--status-success); border: 2px solid var(--status-success);"></div>
          <div class="flex-row justify-between align-center" style="margin-bottom: 6px;">
            <span style="font-size: 15px; font-weight: 600;">提交申请</span>
            <span class="tag tag-approved">已完成</span>
          </div>
          <div style="font-size: 13px; color: #666;">提交时间: 2024-06-01 10:30</div>
        </div>
      </div>

      <!-- 审批操作 -->
      <div id="approval-section" style="padding: 10px;">
        <div class="card" style="margin-bottom: 10px;">
          <label style="display: block; font-size: 14px; color: #333; margin-bottom: 6px; font-weight: 500;">审批意见（可选）</label>
          <textarea id="approvalComment" style="width: 100%; min-height: 60px; padding: 8px; border: 1px solid #e8e8e8; border-radius: 4px; font-size: 14px;" placeholder="请输入审批意见"></textarea>
          <span style="display: block; text-align: right; font-size: 12px; color: #999; margin-top: 4px;">0/200</span>
        </div>
        <div style="display: flex; gap: 10px;" id="approval-actions">
          <button class="btn-primary" style="flex: 1;" onclick="doApprove()">通过</button>
          <button class="btn-outline" style="flex: 1;" onclick="doReject()">拒绝</button>
        </div>
      </div>
    </div>
  </div>

  <script>
    // Status mapping
    const statusMap = {
      'pending_dorm_manager': { text: '待宿管审批', class: 'tag-pending' },
      'pending_counselor': { text: '待辅导员审批', class: 'tag-pending' },
      'pending_dean': { text: '待学工部审批', class: 'tag-pending' },
      'approved': { text: '已通过', class: 'tag-approved' },
      'rejected': { text: '已拒绝', class: 'tag-rejected' }
    };

    function getStatusDisplay(status) {
      return statusMap[status] || { text: status, class: 'tag' };
    }

    function showScreen(index) {
      document.querySelectorAll('.screen').forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.nav-tabs .nav-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }

    async function doLogin() {
      const userId = document.getElementById('loginUserId').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');
      const btn = event?.target || document.querySelector('#screen-login .btn-primary');

      if (!userId || !password) {
        errorEl.textContent = '请输入用户ID和密码';
        errorEl.style.display = 'block';
        return;
      }

      // Loading state
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const result = await apiLogin(userId, password);

        if (result.success) {
          errorEl.style.display = 'none';
          document.getElementById('loginUserId').value = '';
          document.getElementById('loginPassword').value = '';

          // Show nav tabs and user bar
          document.getElementById('navTabs').style.display = 'flex';
          document.getElementById('userBar').style.display = 'flex';
          document.getElementById('currentUserName').textContent = result.user.name;
          const roleMap = {
            'student': '学生',
            'dorm_manager': '宿管员',
            'counselor': '辅导员',
            'dean': '学工部'
          };
          document.getElementById('currentUserRole').textContent = '(' + (roleMap[result.user.role] || result.user.role) + ')';

          // Update UI based on role
          updateUIForRole(result.user.role);

          // Hide login screen
          document.getElementById('screen-login').classList.remove('active');

          // Route based on role and application status
          if (result.user.role === 'student') {
            document.getElementById('studentName').textContent = result.user.name;
            document.getElementById('studentId').textContent = result.user.user_id;

            // Check if student has applications
            const applications = await apiGetApplications();
            if (applications.results && applications.results.length > 0) {
              showScreen(1); // Show application progress
              loadMyApplications();
            } else {
              showScreen(0); // Show application form
            }
          } else {
            showScreen(1); // Approval list screen
            loadApprovals();
          }
        } else {
          errorEl.textContent = result.error.error || '登录失败，请检查用户ID和密码';
          errorEl.style.display = 'block';
        }
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function updateUIForRole(role) {
      const isStudent = role === 'student';
      const isDean = role === 'dean';

      // Update nav tab text
      document.getElementById('nav-approval-text').textContent = isStudent ? '我的申请' : (isDean ? '备案查询' : '审批列表');

      // Update list page title and role display
      document.getElementById('list-title').textContent = isStudent ? '我的申请' : (isDean ? '备案查询' : '审批列表');
      document.getElementById('role-display').textContent = (isStudent ? '学生' : isDean ? '学工部' : role === 'counselor' ? '辅导员' : '宿管员');

      // Show/hide approval section for student/dean
      const approvalSection = document.getElementById('approval-section');
      if (approvalSection) {
        approvalSection.style.display = (isStudent || isDean) ? 'none' : 'block';
      }
    }

    function logout() {
      currentToken = null;
      currentUser = null;
      document.getElementById('navTabs').style.display = 'none';
      document.getElementById('userBar').style.display = 'none';
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-login').classList.add('active');
    }

    // File upload management
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
    const ALLOWED_TYPES = ['.jpg', '.jpeg', '.png', '.pdf', '.doc', '.docx'];
    let uploadedFiles = [];

    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadArea = document.querySelector('.upload-area');

    // File selection handler
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // Drag and drop handlers
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--primary-color)';
      uploadArea.style.background = '#fafafa';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      const validFiles = [];
      const errors = [];

      Array.from(files).forEach(file => {
        const ext = '.' + file.name.split('.').pop().toLowerCase();

        if (!ALLOWED_TYPES.includes(ext)) {
          errors.push(`${file.name}: 不支持的文件格式`);
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          errors.push(`${file.name}: 文件大小超过10MB`);
          return;
        }

        validFiles.push(file);
      });

      if (errors.length > 0) {
        errors.forEach(err => showToast(err, 'error'));
      }

      uploadedFiles = uploadedFiles.concat(validFiles);
      renderFileList();
      fileInput.value = ''; // Reset input
    }

    function renderFileList() {
      fileList.innerHTML = uploadedFiles.map((file, index) => `
        <div class="file-item">
          <span style="font-size: 20px;">📄</span>
          <div class="file-info">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatFileSize(file.size)}</div>
          </div>
          <button class="btn-delete" onclick="removeFile(${index})" type="button">×</button>
        </div>
      `).join('');
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderFileList();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// Toast通知函数
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type !== 'info' ? ' ' + type : '');
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'slideIn 0.3s ease-out reverse';
    setTimeout(() => container.removeChild(toast), 300);
  }, 3000);
}
</script>
</body>
</html>
