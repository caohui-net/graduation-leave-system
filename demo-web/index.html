<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>毕业离校申请系统 - UI Demo</title>
  <link rel="stylesheet" href="css/global.css">
  <script src="js/api.js?v=20260610-1650"></script>
<script>
    let currentFilter = 'all';
    let approvalOffset = 0;
    let approvalHasMore = true;
    let deanDisplayedApps = new Set(); // Track displayed application IDs for dean deduplication
    // currentUser is declared in api.js

    // HTML escape helper to prevent XSS
    function escapeHtml(text) {
        if (!text) return '';
        const div = document.createElement('div');
        div.textContent = text;
        return div.innerHTML;
    }

    async function loadMyApplications() {
        if (!currentToken) return;
        const data = await apiGetApplications();
        const listContainer = document.getElementById('approval-list-container');

        if (data.results && data.results.length > 0) {
            // Apply filter
            let filtered = data.results;
            if (currentFilter === 'pending') {
                filtered = data.results.filter(a => a.status && a.status.startsWith('pending_'));
            } else if (currentFilter === 'decided') {
                filtered = data.results.filter(a => a.status === 'approved' || a.status === 'rejected');
            }

            let htmlStr = '';
            filtered.forEach(app => {
                const statusDisplay = getStatusDisplay(app.status);
                const appIdDisplay = app.application_id ? app.application_id.substring(0,8) : '未知';
                htmlStr += '<div class="card" style="cursor: pointer;">' +
                  '<div class="flex-row justify-between align-center" style="margin-bottom: 8px;">' +
                    '<span style="font-size: 16px; font-weight: bold;">申请 ' + appIdDisplay + '</span>' +
                    '<span class="tag ' + statusDisplay.class + '">' + statusDisplay.text + '</span>' +
                  '</div>' +
                  '<div style="margin-bottom: 4px;">' +
                    '<span style="font-size: 14px; color: #999; margin-right: 8px;">离校日期:</span>' +
                    '<span style="font-size: 14px; color: #333;">' + (app.leave_date || '-') + '</span>' +
                  '</div>' +
                  '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;">' +
                    '<span style="font-size: 12px; color: #999;">' + new Date(app.created_at).toLocaleString() + '</span>' +
                  '</div>' +
                '</div>';
            });
            listContainer.innerHTML = htmlStr;
        } else {
            listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">暂无申请记录</div>';
        }
    }

    async function loadApprovals(append = false) {
        console.log('[DEBUG] loadApprovals called, append=', append, 'currentToken=', currentToken);
        if (!currentToken) return;

        if (!append) {
            approvalOffset = 0;
            approvalHasMore = true;
            deanDisplayedApps.clear(); // Clear deduplication set on fresh load
        }

        // Map currentFilter to API decision parameter
        let decision = 'pending';
        if (currentFilter === 'all') {
            decision = 'all';
        } else if (currentFilter === 'decided') {
            decision = 'all'; // Get all, then filter for approved/rejected
        }

        const listContainer = document.getElementById('approval-list-container');
        const loadMoreBtn = document.getElementById('load-more-approvals');

        const TARGET_COUNT = 20; // Target number of deduplicated records to display
        const BATCH_SIZE = 20;   // API request batch size
        const MAX_ITERATIONS = 10; // Safety limit to prevent infinite loops
        let accumulatedResults = [];
        let currentOffset = approvalOffset;
        let totalCount = 0;
        let iterations = 0;

        // Loop until we have TARGET_COUNT deduplicated records or no more data
        while (accumulatedResults.length < TARGET_COUNT && iterations < MAX_ITERATIONS) {
            iterations++;
            const data = await apiGetApprovals(decision, BATCH_SIZE, currentOffset);
            console.log('[DEBUG] apiGetApprovals returned:', data, 'offset:', currentOffset);

            if (!data || !data.results || data.results.length === 0) {
                // No more data from API
                break;
            }

            totalCount = data.count;

            // Apply front-end filter only for 'decided' (approved or rejected)
            let filtered = data.results;
            if (currentFilter === 'decided') {
                filtered = data.results.filter(a => a.decision === 'approved' || a.decision === 'rejected');
                console.log('[DEBUG] Filtered decided count:', filtered.length);
            }

            // For dean/admin: deduplicate by application_id
            if (currentUser && (currentUser.role === 'dean' || currentUser.role === 'admin')) {
                const beforeCount = filtered.length;
                const newUniqueRecords = [];
                const orphanApprovals = [];

                filtered.forEach(approval => {
                    const appId = approval.application?.id;
                    if (appId) {
                        if (!deanDisplayedApps.has(appId)) {
                            newUniqueRecords.push(approval);
                            deanDisplayedApps.add(appId); // Track globally across pages
                        }
                    } else {
                        // Keep approvals without application link
                        orphanApprovals.push(approval);
                    }
                });

                filtered = newUniqueRecords.concat(orphanApprovals);
                console.log('[DEBUG] Dedup: before', beforeCount, '→ after', filtered.length, 'deanDisplayedApps size:', deanDisplayedApps.size);
            }

            accumulatedResults = accumulatedResults.concat(filtered);
            currentOffset += BATCH_SIZE;

            // Stop if we've reached the end of available data
            if (currentOffset >= totalCount) {
                break;
            }
        }

        // Render accumulated results (up to TARGET_COUNT)
        const displayRecords = accumulatedResults.slice(0, TARGET_COUNT);
        console.log('[DEBUG] Displaying', displayRecords.length, 'records, accumulated', accumulatedResults.length);

        // Status map based on backend expectations
        const statusMap = {
            'pending_dorm_manager': { text: '待宿管审批', cls: 'tag-pending' },
            'pending_counselor': { text: '待辅导员审批', cls: 'tag-pending' },
            'pending_dean': { text: '待学工部审批', cls: 'tag-pending' },
            'approved': { text: '已通过', cls: 'tag-approved' },
            'rejected': { text: '已拒绝', cls: 'tag-rejected' }
        };

        const decisionMap = {
            'pending': { text: '待审批', cls: 'tag-pending' },
            'approved': { text: '已通过', cls: 'tag-approved' },
            'rejected': { text: '已拒绝', cls: 'tag-rejected' }
        };

        if (displayRecords.length > 0) {
            let htmlStr = '';

            displayRecords.forEach(approval => {
                const application = approval.application || {};

                // Use approval decision for status tag (more accurate for dean/approval views)
                const decision = approval.decision || 'pending';
                const step = decisionMap[decision] ? decisionMap[decision].text : decision;
                const tagCls = decisionMap[decision] ? decisionMap[decision].cls : 'tag-pending';

                const safeAppId = escapeHtml(application.id || approval.id).substring(0,8);
                const safeStudentName = escapeHtml(application.student_name || '-');
                const safeStudentId = escapeHtml(application.student_id || '-');

                htmlStr += '<div class="card" onclick="openApproval(\'' + approval.id + '\')" style="cursor: pointer;">' +
                  '<div class="flex-row justify-between align-center" style="margin-bottom: 8px;">' +
                    '<span style="font-size: 16px; font-weight: bold;">申请 ' + safeAppId + '</span>' +
                    '<span class="tag ' + tagCls + '">' + step + '</span>' +
                  '</div>' +
                  '<div style="margin-bottom: 4px;">' +
                    '<span style="font-size: 14px; color: #999; margin-right: 8px;">学生:</span>' +
                    '<span style="font-size: 14px; color: #333;">' + safeStudentName + ' (' + safeStudentId + ')</span>' +
                  '</div>';

                // Show approver and decision time for decided approvals
                if (approval.decision === 'approved' || approval.decision === 'rejected') {
                    // Extract real approver name from comment if auto-completed
                    let realApprover = approval.approver_name || '-';
                    if (approval.comment && approval.comment.includes('已由')) {
                        const match = approval.comment.match(/已由(.+?)完成审批/);
                        if (match) {
                            realApprover = match[1];
                        }
                    }
                    const safeApprover = escapeHtml(realApprover);

                    htmlStr += '<div style="margin-bottom: 4px;">' +
                      '<span style="font-size: 14px; color: #999; margin-right: 8px;">审批人:</span>' +
                      '<span style="font-size: 14px; color: #333;">' + safeApprover + '</span>' +
                    '</div>';
                    if (approval.decided_at) {
                        htmlStr += '<div style="margin-bottom: 4px;">' +
                          '<span style="font-size: 14px; color: #999; margin-right: 8px;">审批时间:</span>' +
                          '<span style="font-size: 14px; color: #333;">' + new Date(approval.decided_at).toLocaleString() + '</span>' +
                        '</div>';
                    }
                }

                htmlStr += '<div style="margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0;">' +
                    '<span style="font-size: 12px; color: #999;">创建: ' + new Date(approval.created_at || application.created_at).toLocaleString() + '</span>' +
                  '</div>' +
                '</div>';
            });

            if (append) {
                listContainer.innerHTML += htmlStr;
            } else {
                listContainer.innerHTML = htmlStr;
            }

            // Update offset to current position
            approvalOffset = currentOffset;

            // Check if there's more data to load
            // Has more if: we haven't displayed all accumulated results, or there's more data in API
            approvalHasMore = (accumulatedResults.length > TARGET_COUNT) || (currentOffset < totalCount);

            if (loadMoreBtn) {
                loadMoreBtn.style.display = approvalHasMore ? 'block' : 'none';
            }
        } else {
            if (!append) {
                listContainer.innerHTML = '<div style="text-align:center; padding: 20px; color:#999;">暂无数据</div>';
            }
            if (loadMoreBtn) {
                loadMoreBtn.style.display = 'none';
            }
        }
    }

    function filterApprovals(filter) {
        currentFilter = filter;

        // Update tab active state
        const tabs = document.querySelectorAll('#approval-tabs .nav-tab');
        tabs.forEach((tab, index) => {
            tab.classList.remove('active');
            if ((filter === 'all' && index === 0) ||
                (filter === 'pending' && index === 1) ||
                (filter === 'decided' && index === 2)) {
                tab.classList.add('active');
            }
        });

        // Reload list with filter
        if (currentUser && currentUser.role === 'student') {
            loadMyApplications();
        } else {
            loadApprovals();
        }
    }

    let currentApprovalId = null;
    async function openApproval(id) {
        currentApprovalId = id;
        showScreen(2);

        const res = await fetch(API_BASE_URL + '/approvals/' + id + '/', {
            headers: getAuthHeaders()
        });
        if (res.ok) {
            const detail = await res.json();

            const appRes = await fetch(API_BASE_URL + '/applications/' + detail.application_id + '/', {
                headers: getAuthHeaders()
            });
            const appData = appRes.ok ? await appRes.json() : null;

            // Fetch attachments
            const attachments = await apiGetAttachments(detail.application_id);

            const container = document.querySelector('#screen-2');

            const basicInfoHtml = '<div class="card">' +
                '<div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">基本信息</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">申请ID:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.application_id || detail.id.substring(0,8)) + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">学生:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.student_name || '-') + ' (' + (detail.student_id || '-') + ')</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">联系电话:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.contact_phone || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">离校日期:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.leave_date || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">楼栋号:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.building || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">房间号:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.room_number || '-') + '</span>' +
                '</div>' +
                '<div style="display: flex; margin-bottom: 8px;">' +
                  '<span style="font-size: 14px; color: #999; width: 80px;">申请原因:</span>' +
                  '<span style="font-size: 14px; color: #333; flex: 1;">' + (detail.reason || '无') + '</span>' +
                '</div>' +
              '</div>';

            // Generate attachment HTML - hide download for counselor/dorm_manager
            let attachmentHtml = '';
            if (attachments && attachments.length > 0) {
                const showDownload = currentUser && (currentUser.role === 'dean' || currentUser.role === 'admin');
                attachmentHtml = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">附件材料</div>';
                attachments.forEach(att => {
                    attachmentHtml += '<div style="display: flex; align-items: center; padding: 8px 0; border-bottom: 1px solid #f0f0f0;">' +
                        '<span style="font-size: 14px; color: #333; flex: 1;">' + att.file_name + ' (' + (att.file_size / 1024).toFixed(2) + ' KB)</span>' +
                        '<button onclick="handleAttachmentPreview(\'' + att.attachment_id + '\')" style="font-size: 14px; color: var(--primary-color); background: none; border: none; cursor: pointer; margin-right: 12px;">预览</button>' +
                        (showDownload ? '<button onclick="handleAttachmentDownload(\'' + att.attachment_id + '\', \'' + att.file_name + '\')" style="font-size: 14px; color: var(--primary-color); background: none; border: none; cursor: pointer;">下载</button>' : '') +
                    '</div>';
                });
                attachmentHtml += '</div>';
            }

            // 动态生成审批时间轴
            const timelineHtml = generateTimeline(detail, appData);

            const cards = container.querySelectorAll('.card');
            if (cards.length > 0) {
                cards[0].outerHTML = basicInfoHtml;
            }
            if (cards.length > 1) {
                if (attachmentHtml) {
                    cards[1].outerHTML = attachmentHtml + timelineHtml;
                } else {
                    cards[1].outerHTML = timelineHtml;
                }
            }
        }
    }

    function generateTimeline(detail, appData) {
        const stepNames = {
            'dorm_manager': '宿管员审批',
            'counselor': '辅导员审批',
            'dean': '学工部审批'
        };

        const appStatus = appData ? appData.status : detail.step;

        // Filter workflow based on current user role
        let workflow = ['dorm_manager', 'counselor', 'dean'];
        if (currentUser && currentUser.role === 'dorm_manager') {
            workflow = ['dorm_manager'];
        } else if (currentUser && currentUser.role === 'counselor') {
            workflow = ['dorm_manager', 'counselor'];
        }
        // dean/admin sees all steps (default)

        // Calculate current level index
        let currentLevel;
        if (appStatus === 'approved') {
            currentLevel = workflow.length;
        } else if (appStatus === 'rejected') {
            currentLevel = workflow.indexOf(detail.step);
        } else if (appStatus.startsWith('pending_')) {
            const pendingStep = appStatus.replace('pending_', '');
            currentLevel = workflow.indexOf(pendingStep);
        } else {
            currentLevel = -1;
        }

        let html = '<div class="card"><div style="font-size: 16px; font-weight: bold; margin-bottom: 10px;">审批记录</div>';

        for (let i = workflow.length - 1; i >= 0; i--) {
            const step = workflow[i];
            const stepName = stepNames[step];
            const isLast = i === 0;

            let state, tagText, tagCls, dotBg, dotBorder, showConnector;

            // Check if this is the current approval's step
            if (step === detail.step) {
                if (detail.decision === 'approved') {
                    state = 'approved';
                    tagText = '已通过';
                    tagCls = 'tag-approved';
                    dotBg = 'var(--status-success)';
                    dotBorder = 'var(--status-success)';
                } else if (detail.decision === 'rejected') {
                    state = 'rejected';
                    tagText = '已驳回';
                    tagCls = 'tag-rejected';
                    dotBg = 'var(--status-error)';
                    dotBorder = 'var(--status-error)';
                } else {
                    state = 'pending';
                    tagText = '待审批';
                    tagCls = 'tag-pending';
                    dotBg = 'white';
                    dotBorder = 'var(--primary-color)';
                }
                showConnector = !isLast;
            } else if (i < currentLevel || appStatus === 'approved') {
                state = 'approved';
                tagText = '已通过';
                tagCls = 'tag-approved';
                dotBg = 'var(--status-success)';
                dotBorder = 'var(--status-success)';
                showConnector = !isLast;
            } else if (i === currentLevel && appStatus !== 'rejected') {
                state = 'pending';
                tagText = '待审批';
                tagCls = 'tag-pending';
                dotBg = 'white';
                dotBorder = 'var(--primary-color)';
                showConnector = !isLast;
            } else {
                state = 'future';
                tagText = '未开始';
                tagCls = 'tag';
                dotBg = '#e8e8e8';
                dotBorder = '#e8e8e8';
                showConnector = !isLast;
            }

            html += '<div style="position: relative; padding-left: 30px;' + (isLast ? '' : ' margin-bottom: 20px;') + '">' +
              '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: ' + dotBg + '; border: 2px solid ' + dotBorder + ';"></div>';

            if (showConnector) {
                html += '<div style="position: absolute; left: 14px; top: 16px; bottom: -20px; width: 1px; background: #e8e8e8;"></div>';
            }

            html += '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
                '<span style="font-size: 15px; font-weight: 600;">' + stepName + '</span>' +
                '<span class="tag ' + tagCls + '">' + tagText + '</span>' +
              '</div>';

            if (state === 'approved' || state === 'pending' || state === 'rejected') {
                if (detail.step === step) {
                    html += '<div style="font-size: 13px; color: #666;">审批人: ' + (detail.approver_name || '待分配') + '</div>';
                    if (detail.decided_at) {
                        html += '<div style="font-size: 13px; color: #666;">时间: ' + detail.decided_at + '</div>';
                    }
                    if (detail.comment) {
                        html += '<div style="font-size: 13px; color: #666; margin-top: 4px;">意见: ' + detail.comment + '</div>';
                    }
                }
            }

            html += '</div>';
        }

        html += '<div style="position: relative; padding-left: 30px; margin-top: 20px;">' +
          '<div style="position: absolute; left: 10px; top: 4px; width: 10px; height: 10px; border-radius: 50%; background: var(--status-success); border: 2px solid var(--status-success);"></div>' +
          '<div class="flex-row justify-between align-center" style="margin-bottom: 6px;">' +
            '<span style="font-size: 15px; font-weight: 600;">提交申请</span>' +
            '<span class="tag tag-approved">已完成</span>' +
          '</div>' +
          '<div style="font-size: 13px; color: #666;">学生已提交</div>' +
        '</div></div>';

        return html;
    }
    
    async function doApprove() {
        if(!currentApprovalId) return;
        const comment = document.getElementById('approvalComment').value;
        const btn = event?.target || document.querySelector('#approval-actions .btn-primary');

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '处理中...';

        try {
            const ok = await apiApprove(currentApprovalId, comment);
            if(ok) { showToast('审批通过', 'success'); showScreen(1); loadApprovals(); }
            else { showToast('审批失败', 'error'); }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    async function doReject() {
        if(!currentApprovalId) return;
        const comment = document.getElementById('approvalComment').value;
        const btn = event?.target || document.querySelector('#approval-actions .btn-outline');

        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '处理中...';

        try {
            const ok = await apiReject(currentApprovalId, comment);
            if(ok) { showToast('审批拒绝', 'success'); showScreen(1); loadApprovals(); }
            else { showToast('审批失败', 'error'); }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    async function handleAttachmentPreview(attachmentId) {
        try {
            const url = API_BASE_URL + '/api/attachments/' + attachmentId + '/download/?preview=true';
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            if (!response.ok) throw new Error('预览失败');
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            window.open(blobUrl, '_blank');
            setTimeout(() => URL.revokeObjectURL(blobUrl), 100);
        } catch (error) {
            showToast('预览失败: ' + error.message, 'error');
        }
    }

    async function handleAttachmentDownload(attachmentId, fileName) {
        try {
            const url = API_BASE_URL + '/api/attachments/' + attachmentId + '/download/';
            const response = await fetch(url, {
                headers: { 'Authorization': 'Bearer ' + currentToken }
            });
            if (!response.ok) throw new Error('下载失败');
            const blob = await response.blob();
            const blobUrl = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = blobUrl;
            a.download = fileName;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(blobUrl);
            showToast('下载成功', 'success');
        } catch (error) {
            showToast('下载失败: ' + error.message, 'error');
        }
    }

    async function exportApprovals() {
        const btn = document.getElementById('export-btn');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '加载中...';

        try {
            // Fetch preview data (JSON format)
            const res = await fetch(API_BASE_URL + '/approvals/?decision=all&limit=1000', {
                headers: getAuthHeaders()
            });

            if (res.ok) {
                const data = await res.json();
                showExcelPreview(data.results);
            } else {
                showToast('加载数据失败', 'error');
            }
        } catch (err) {
            console.error('Export preview failed:', err);
            showToast('加载失败', 'error');
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }

    function showExcelPreview(approvals) {
        // Status mapping to Chinese
        const statusMap = {
            'pending_dorm_manager': '待宿管审批',
            'pending_counselor': '待辅导员审批',
            'pending_dean': '待学工部审批',
            'approved': '已通过',
            'rejected': '已拒绝',
            'draft': '草稿'
        };

        const decisionMap = {
            'pending': '待审批',
            'approved': '已通过',
            'rejected': '已拒绝'
        };

        // Build table header
        const headers = ['申请ID', '提交人', '学号', '手机号', '离校日期', '楼栋号', '房间号', '提交时间', '审批状态',
                        '宿管员', '宿管审批时间', '宿管审批结果', '辅导员', '辅导员审批时间', '辅导员审批结果'];

        const headerHTML = '<tr>' + headers.map(h => `<th style="padding: 8px; border: 1px solid #ddd; text-align: left; white-space: nowrap;">${h}</th>`).join('') + '</tr>';
        document.getElementById('excelPreviewHeader').innerHTML = headerHTML;

        // Build table body - group approvals by application
        const appMap = new Map();
        approvals.forEach(approval => {
            const appId = approval.application?.id;
            if (appId && !appMap.has(appId)) {
                appMap.set(appId, {
                    application: approval.application,
                    dormApproval: null,
                    counselorApproval: null
                });
            }

            if (appId) {
                const record = appMap.get(appId);
                if (approval.step === 'dorm_manager') {
                    record.dormApproval = approval;
                } else if (approval.step === 'counselor') {
                    record.counselorApproval = approval;
                }
            }
        });

        const rows = Array.from(appMap.values()).map(record => {
            const app = record.application;
            const dorm = record.dormApproval;
            const counselor = record.counselorApproval;

            // Helper function to format date safely
            const formatDate = (dateStr) => {
                if (!dateStr) return '-';
                const date = new Date(dateStr);
                return isNaN(date.getTime()) ? '-' : date.toLocaleString();
            };

            return `<tr>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.id?.substring(0,8) || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.student_name || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.student_id || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.contact_phone || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.leave_date || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.building || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${app.room_number || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(app.created_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${statusMap[app.status] || app.status || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${dorm?.approver_name || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(dorm?.decided_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${dorm?.decision ? decisionMap[dorm.decision] || dorm.decision : '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${counselor?.approver_name || '-'}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${formatDate(counselor?.decided_at)}</td>
                <td style="padding: 8px; border: 1px solid #ddd;">${counselor?.decision ? decisionMap[counselor.decision] || counselor.decision : '-'}</td>
            </tr>`;
        }).join('');

        document.getElementById('excelPreviewBody').innerHTML = rows;
        document.getElementById('excelPreviewModal').style.display = 'block';
    }

    function closeExcelPreview() {
        document.getElementById('excelPreviewModal').style.display = 'none';
    }

    async function confirmExcelDownload() {
        closeExcelPreview();

        try {
            const res = await fetch(API_BASE_URL + '/approvals/export/', {
                method: 'GET',
                headers: getAuthHeaders()
            });

            if (res.ok) {
                const blob = await res.blob();
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = '审批数据_' + new Date().toISOString().split('T')[0] + '.xlsx';
                document.body.appendChild(a);
                a.click();
                document.body.removeChild(a);
                window.URL.revokeObjectURL(url);
                showToast('导出成功', 'success');
            } else {
                showToast('导出失败', 'error');
            }
        } catch (err) {
            console.error('Download failed:', err);
            showToast('下载失败', 'error');
        }
    }

    async function doSubmitApplication() {
        const phone = document.getElementById('contactPhone').value;
        const reason = document.getElementById('applicationReason').value;
        const leaveDate = document.getElementById('leaveDate').value;

        // 验证必填字段
        if (!phone || !leaveDate) {
             showToast('请输入联系电话和离校日期', 'error');
             return;
        }

        // 验证附件（必需）
        if (!uploadedFiles || uploadedFiles.length === 0) {
             showToast('请上传附件材料', 'error');
             return;
        }

        // 验证手机号格式（11位，1开头）
        if (!/^1\d{10}$/.test(phone)) {
             showToast('请输入有效的11位手机号码', 'error');
             return;
        }

        // 验证原因长度（最多500字符）
        if (reason && reason.length > 500) {
             showToast('离校原因不能超过500字', 'error');
             return;
        }

        // 验证离校日期（不能早于今天）
        const today = new Date();
        today.setHours(0, 0, 0, 0);
        const selectedDate = new Date(leaveDate);
        if (selectedDate < today) {
             showToast('离校日期不能早于今天', 'error');
             return;
        }

        const btn = event?.target || document.querySelector('#screen-0 .btn-primary');
        const originalText = btn.textContent;
        btn.disabled = true;
        btn.textContent = '提交中...';

        try {
            const result = await apiSubmitApplication(phone, reason, leaveDate, uploadedFiles);
            if (result.success) {
                showToast('申请提交成功', 'success');
                document.getElementById('contactPhone').value = '';
                document.getElementById('applicationReason').value = '';
                document.getElementById('leaveDate').value = '';
                uploadedFiles = [];
                renderFileList();

                // Switch to progress view
                showScreen(1);
                loadMyApplications();
            } else {
                showToast(result.error.message || '申请提交失败', 'error');
            }
        } finally {
            btn.disabled = false;
            btn.textContent = originalText;
        }
    }
</script>

  <script>
    // Status mapping
    const statusMap = {
      'pending_dorm_manager': { text: '待宿管审批', class: 'tag-pending' },
      'pending_counselor': { text: '待辅导员审批', class: 'tag-pending' },
      'pending_dean': { text: '待学工部审批', class: 'tag-pending' },
      'approved': { text: '已通过', class: 'tag-approved' },
      'rejected': { text: '已拒绝', class: 'tag-rejected' }
    };

    function getStatusDisplay(status) {
      return statusMap[status] || { text: status, class: 'tag' };
    }

    function showScreen(index) {
      document.querySelectorAll('.screen').forEach((s, i) => {
        s.classList.toggle('active', i === index);
      });
      document.querySelectorAll('.nav-tabs .nav-tab').forEach((t, i) => {
        t.classList.toggle('active', i === index);
      });
    }

    async function doLogin() {
      const userId = document.getElementById('loginUserId').value.trim();
      const password = document.getElementById('loginPassword').value.trim();
      const errorEl = document.getElementById('loginError');
      const btn = event?.target || document.querySelector('#screen-login .btn-primary');

      if (!userId || !password) {
        errorEl.textContent = '请输入用户ID和密码';
        errorEl.style.display = 'block';
        return;
      }

      // Loading state
      const originalText = btn.textContent;
      btn.disabled = true;
      btn.textContent = '登录中...';

      try {
        const result = await apiLogin(userId, password);

        if (result.success) {
          errorEl.style.display = 'none';
          document.getElementById('loginUserId').value = '';
          document.getElementById('loginPassword').value = '';

          // Show nav tabs and user bar
          document.getElementById('navTabs').style.display = 'flex';
          document.getElementById('userBar').style.display = 'flex';
          document.getElementById('currentUserName').textContent = result.user.name;

          // Store current user for role-based UI control
          currentUser = result.user;

          const roleMap = {
            'student': '学生',
            'dorm_manager': '宿管员',
            'counselor': '辅导员',
            'dean': '学工部'
          };
          document.getElementById('currentUserRole').textContent = '(' + (roleMap[result.user.role] || result.user.role) + ')';

          // Update UI based on role
          updateUIForRole(result.user.role);

          // Hide login screen
          document.getElementById('screen-login').classList.remove('active');

          // Route based on role and application status
          if (result.user.role === 'student') {
            document.getElementById('studentName').textContent = result.user.name;
            document.getElementById('studentId').textContent = result.user.user_id;
            document.getElementById('studentBuilding').textContent = result.user.building || '-';
            document.getElementById('studentRoom').textContent = result.user.room_number || '-';

            // Pre-fill phone if available
            if (result.user.phone) {
              document.getElementById('contactPhone').value = result.user.phone;
            }

            // Check if student has applications
            const applications = await apiGetApplications();
            if (applications.results && applications.results.length > 0) {
              showScreen(1); // Show application progress
              loadMyApplications();
            } else {
              showScreen(0); // Show application form
            }
          } else {
            showScreen(1); // Approval list screen
            loadApprovals();
          }
        } else {
          errorEl.textContent = result.error.error || '登录失败，请检查用户ID和密码';
          errorEl.style.display = 'block';
        }
      } finally {
        btn.disabled = false;
        btn.textContent = originalText;
      }
    }

    function updateUIForRole(role) {
      const isStudent = role === 'student';
      const isDean = role === 'dean';
      const isAdmin = role === 'admin';

      // Hide "学生申请" tab for non-students
      const navTabs = document.querySelectorAll('#navTabs .nav-tab');
      if (navTabs[0]) {
        navTabs[0].style.display = isStudent ? 'block' : 'none';
      }

      // Update nav tab text
      document.getElementById('nav-approval-text').textContent = isStudent ? '我的申请' : (isDean || isAdmin ? '审批查询' : '审批列表');

      // Update list page title and role display
      document.getElementById('list-title').textContent = isStudent ? '我的申请' : (isDean || isAdmin ? '审批查询' : '审批列表');
      document.getElementById('role-display').textContent = (isStudent ? '学生' : isDean ? '学工部' : isAdmin ? '管理员' : role === 'counselor' ? '辅导员' : '宿管员');

      // Show/hide approval section for student/dean/admin
      const approvalSection = document.getElementById('approval-section');
      if (approvalSection) {
        approvalSection.style.display = (isStudent || isDean || isAdmin) ? 'none' : 'block';
      }

      // Show export button for dean and admin roles
      const exportBtn = document.getElementById('export-btn');
      if (exportBtn) {
        exportBtn.style.display = (isDean || isAdmin) ? 'block' : 'none';
      }
    }

    function logout() {
      currentToken = null;
      currentUser = null;
      deanDisplayedApps.clear(); // Clear deduplication memory on logout
      approvalOffset = 0;
      approvalHasMore = true;
      document.getElementById('navTabs').style.display = 'none';
      document.getElementById('userBar').style.display = 'none';
      document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
      document.getElementById('screen-login').classList.add('active');
    }

    // File upload management
    const MAX_FILE_SIZE = 10 * 1024 * 1024; // 10MB
    const ALLOWED_TYPES = ['.jpg', '.jpeg', '.png', '.pdf', '.doc', '.docx'];
    let uploadedFiles = [];

    const fileInput = document.getElementById('fileInput');
    const fileList = document.getElementById('fileList');
    const uploadArea = document.querySelector('.upload-area');

    // File selection handler
    fileInput.addEventListener('change', (e) => {
      handleFiles(e.target.files);
    });

    // Drag and drop handlers
    uploadArea.addEventListener('dragover', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = 'var(--primary-color)';
      uploadArea.style.background = '#fafafa';
    });

    uploadArea.addEventListener('dragleave', () => {
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
    });

    uploadArea.addEventListener('drop', (e) => {
      e.preventDefault();
      uploadArea.style.borderColor = '#d9d9d9';
      uploadArea.style.background = 'white';
      handleFiles(e.dataTransfer.files);
    });

    function handleFiles(files) {
      const validFiles = [];
      const errors = [];

      Array.from(files).forEach(file => {
        const ext = '.' + file.name.split('.').pop().toLowerCase();

        if (!ALLOWED_TYPES.includes(ext)) {
          errors.push(`${file.name}: 不支持的文件格式`);
          return;
        }

        if (file.size > MAX_FILE_SIZE) {
          errors.push(`${file.name}: 文件大小超过10MB`);
          return;
        }

        validFiles.push(file);
      });

      if (errors.length > 0) {
        errors.forEach(err => showToast(err, 'error'));
      }

      uploadedFiles = uploadedFiles.concat(validFiles);
      renderFileList();
      fileInput.value = ''; // Reset input
    }

    function renderFileList() {
      fileList.innerHTML = uploadedFiles.map((file, index) => `
        <div class="file-item">
          <span style="font-size: 20px;">📄</span>
          <div class="file-info">
            <div class="file-name">${file.name}</div>
            <div class="file-size">${formatFileSize(file.size)}</div>
          </div>
          <button class="btn-delete" onclick="removeFile(${index})" type="button">×</button>
        </div>
      `).join('');
    }

    function removeFile(index) {
      uploadedFiles.splice(index, 1);
      renderFileList();
    }

    function formatFileSize(bytes) {
      if (bytes < 1024) return bytes + ' B';
      if (bytes < 1024 * 1024) return (bytes / 1024).toFixed(1) + ' KB';
      return (bytes / (1024 * 1024)).toFixed(1) + ' MB';
    }
  </script>

<!-- Toast容器 -->
<div class="toast-container" id="toastContainer"></div>

<script>
// Toast通知函数
function showToast(message, type = 'info') {
  const container = document.getElementById('toastContainer');
  const toast = document.createElement('div');
  toast.className = 'toast' + (type !== 'info' ? ' ' + type : '');
  toast.textContent = message;
  container.appendChild(toast);

  setTimeout(() => {
    toast.style.animation = 'slideIn 0.3s ease-out reverse';
    setTimeout(() => container.removeChild(toast), 300);
  }, 3000);
}
</script>
